# Apply SSH key schema extension to Samba AD.
# Stores SSH public keys in AD user objects via ldapPublicKey auxiliary class.
# Requires stopping samba-ad-dc because the schema module blocks online changes.
---
- name: Compute schema base DN
  ansible.builtin.set_fact:
    samba_schema_base_dn: "{{ samba_realm | upper | regex_replace('\\.', ',DC=') | regex_replace('^', 'DC=') }}"

- name: Check if SSH schema marker exists
  ansible.builtin.stat:
    path: "{{ samba_statedir }}/.ssh_schema_applied"
  register: _ssh_schema_marker

- name: Check if ldapPublicKey class exists in schema
  ansible.builtin.shell: |
    set -o pipefail
    ldbsearch -H /var/lib/samba/private/sam.ldb \
      -b "CN=Schema,CN=Configuration,{{ samba_schema_base_dn }}" \
      "(cn=ldapPublicKey)" cn 2>/dev/null | grep -c "^cn: ldapPublicKey" || true
  args:
    executable: /bin/bash
  register: _ssh_schema_exists
  changed_when: false

- name: Apply SSH key schema extensions
  when:
    - not _ssh_schema_marker.stat.exists
    - _ssh_schema_exists.stdout | int == 0
  block:
    - name: Generate SSH schema LDIF
      ansible.builtin.template:
        src: ldif/ssh_schema.ldif.j2
        dest: /tmp/ssh_schema.ldif
        owner: root
        group: root
        mode: "0600"

    - name: Stop Samba AD DC for schema modification
      ansible.builtin.systemd:
        name: "{{ samba_dc_service }}"
        state: stopped
      register: _samba_stopped_for_ssh_schema

    - name: Apply SSH schema to AD
      ansible.builtin.command:
        cmd: ldbmodify -H /var/lib/samba/private/sam.ldb /tmp/ssh_schema.ldif
      register: _ssh_schema_apply
      changed_when: _ssh_schema_apply.rc == 0

    - name: Start Samba AD DC after SSH schema modification # noqa: no-handler
      ansible.builtin.systemd:
        name: "{{ samba_dc_service }}"
        state: started
      when: _samba_stopped_for_ssh_schema is changed

    - name: Wait for Samba to be ready after SSH schema # noqa: no-handler
      ansible.builtin.command:
        cmd: samba-tool testparm --suppress-prompt
      register: _samba_ready_ssh
      until: _samba_ready_ssh.rc == 0
      retries: 10
      delay: 3
      changed_when: false
      when: _samba_stopped_for_ssh_schema is changed

    - name: Verify SSH schema was applied
      ansible.builtin.shell: |
        set -o pipefail
        ldbsearch -H /var/lib/samba/private/sam.ldb \
          -b "CN=Schema,CN=Configuration,{{ samba_schema_base_dn }}" \
          "(cn=ldapPublicKey)" cn 2>/dev/null | grep -q "^cn: ldapPublicKey"
      args:
        executable: /bin/bash
      register: _ssh_schema_verify_applied
      changed_when: false
      failed_when: _ssh_schema_verify_applied.rc != 0

    - name: Create SSH schema marker file
      ansible.builtin.file:
        path: "{{ samba_statedir }}/.ssh_schema_applied"
        state: touch
        owner: root
        group: root
        mode: "0644"

    - name: Clean up SSH schema LDIF
      ansible.builtin.file:
        path: /tmp/ssh_schema.ldif
        state: absent

  rescue:
    - name: Ensure Samba is started after SSH schema failure
      ansible.builtin.systemd:
        name: "{{ samba_dc_service }}"
        state: started
      when: _samba_stopped_for_ssh_schema is defined and _samba_stopped_for_ssh_schema is changed

    - name: Clean up SSH schema LDIF on failure
      ansible.builtin.file:
        path: /tmp/ssh_schema.ldif
        state: absent

    - name: Fail with SSH schema error
      ansible.builtin.fail:
        msg: "Failed to apply SSH schema extension. Check logs above for details."

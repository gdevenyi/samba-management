[defaults]
inventory = inventory.yml
host_key_checking = False
# Use the dedicated test key generated by setup.sh; the VMs only trust this one.
private_key_file = ./.ssh/id_ed25519
remote_user = ubuntu
become = True
become_method = sudo
roles_path = ../ansible/roles
retry_files_enabled = False
deprecation_warnings = False

[callback_default]
result_format = yaml

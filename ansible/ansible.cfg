# ansible.cfg - Ansible configuration for the Samba AD management suite.
#
# All paths are relative to this file's directory (ansible/).

[defaults]
# Use the YAML inventory file containing DC, Linux client, and Windows client groups.
inventory = inventory/hosts.yml
# Role directory for the Samba DC, SSSD client, autofs, and healthcheck roles.
roles_path = roles
# Disable strict host key checking so initial provisioning of new machines
# doesn't hang on the SSH key acceptance prompt.
host_key_checking = False
# Disable retry files to avoid cluttering the working directory on failures.
retry_files_enabled = False
# Opt into the future ansible-core default: gathered facts are NOT injected as
# top-level `ansible_*` vars (that behavior is deprecated, removed in 2.24).
# All roles/playbooks reference facts via ansible_facts['...'] accordingly.
inject_facts_as_vars = False
# Render task results as YAML for readability.  The old `community.general.yaml`
# stdout callback was removed in community.general 12.0.0; the built-in default
# callback with `result_format = yaml` (below) supersedes it (ansible-core 2.13+).
stdout_callback = default
bin_ansible_callbacks = True

[callback_default]
result_format = yaml

# All playbooks require root privileges on the target hosts.
[privilege_escalation]
become = True
become_method = sudo

# SSH pipelining reduces the number of SSH connections per task, significantly
# speeding up playbook execution (requires disable requiretty on targets).
[ssh_connection]
pipelining = True

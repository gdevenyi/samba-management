# nfs-server tasks - Configure a domain-joined machine as an NFSv4+Kerberos storage server.
#
# Prerequisites: the sssd-client role must have been applied first (the
# machine must already be domain-joined with a valid computer account and
# SSSD resolving AD users and groups).
#
# This file orchestrates focused subtask files; the bulk of the logic lives
# in keytab.yml / ssh-trust.yml / exports.yml / services.yml.
---
- name: Pre-flight assertions
  ansible.builtin.import_tasks: assertions.yml

- name: Register this host in Samba DNS so the DC and clients can resolve it
  ansible.builtin.import_tasks: dns-register.yml

- name: Provision NFS service principal and keytab
  ansible.builtin.import_tasks: keytab.yml

- name: Authorize DC root SSH key for cross-host home management
  ansible.builtin.import_tasks: ssh-trust.yml

- name: Create share directories and NFS export files
  ansible.builtin.import_tasks: exports.yml

- name: Install, configure, and start NFS services
  ansible.builtin.import_tasks: services.yml

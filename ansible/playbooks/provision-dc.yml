# provision-dc.yml - Ansible playbook to provision a Samba AD Domain Controller.
#
# Applies the samba-dc role which installs packages, runs `samba-tool
# domain provision`, deploys smb.conf and krb5.conf, configures
# systemd-timesyncd, sets up Samba's internal DNS plus a reverse zone,
# applies password policy, installs SSSD on the DC, applies the sudo
# schema extension, seeds AD-stored autofs maps, and (when NFS is
# colocated) creates share directories and NFS exports.  Safe to re-run:
# provisioning tasks are gated by both a marker file and the presence of
# sam.ldb.
---
- name: Provision Samba Active Directory Domain Controller
  hosts: dc
  become: true
  roles:
    - samba-dc

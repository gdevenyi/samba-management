# deprovision-linux.yml - Ansible playbook to remove a Linux client from the AD domain.
#
# Reverses the provisioning done by provision-linux-sssd.yml: leaves the
# domain, stops/disables SSSD + autofs, removes SSSD and autofs configuration
# (including the legacy file-based map files from older versions of this
# role).  failed_when:false / state=absent are used so the playbook is
# idempotent even on partially-provisioned clients.
---
- name: Deprovision Linux client from domain
  hosts: linux_clients
  become: true
  tasks:
    - name: Validate domain variable is defined
      ansible.builtin.assert:
        that:
          - sssd_domain is defined
        fail_msg: "sssd_domain must be defined"

    # realm leave removes the computer object from AD and cleans up local config.
    - name: Leave the domain
      ansible.builtin.command: "realm leave {{ sssd_domain }}"
      failed_when: false
      changed_when: false

    - name: Stop and disable autofs
      ansible.builtin.systemd:
        name: autofs
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable SSSD
      ansible.builtin.systemd:
        name: sssd
        state: stopped
        enabled: false
      failed_when: false

    # sssd.conf contains cached credentials; always remove it on deprovision.
    - name: Remove sssd.conf
      ansible.builtin.file:
        path: /etc/sssd/sssd.conf
        state: absent

    # Remove the automount nsswitch routing so any local autofs reinstall
    # doesn't try to look up maps via a (now-disabled) SSSD.
    - name: Remove SSSD autofs nsswitch routing
      ansible.builtin.lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^automount:'
        state: absent
      failed_when: false

    # Remove any local autofs map files.  Covers both the legacy file-based
    # layout (this role used to write these) and any ad-hoc files an operator
    # may have dropped.  AD-stored maps live in sam.ldb and are unaffected.
    - name: Remove local autofs map files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/auto.master.d/shares.autofs
        - /etc/auto.shares
        - /etc/auto.master.d/home.autofs
        - /etc/auto.home

# samba-healthcheck tasks - Non-destructive verification of domain health.
#
# Checks DNS SRV records, Kerberos tickets, SSSD/Winbind/Autofs services,
# NSS user/group resolution, DC network connectivity, and active NFS mounts.
# All checks use ignore_errors: true so the full summary is always printed
# even when individual checks fail.
---
# --- DNS checks ---
# SRV records are the primary service discovery mechanism in AD.  Without
# them, clients cannot locate domain controllers automatically.
# DNS tasks must not fail the play -- the summary task below renders the
# pass/fail matrix and that should always run, even when individual checks
# detect a problem.
- name: Check DNS SRV _ldap._tcp
  ansible.builtin.command: "host -t SRV _ldap._tcp.{{ healthcheck_realm | lower }}"
  register: dns_ldap
  changed_when: false
  failed_when: false

- name: Check DNS SRV _kerberos._tcp
  ansible.builtin.command: "host -t SRV _kerberos._tcp.{{ healthcheck_realm | lower }}"
  register: dns_krb
  changed_when: false
  failed_when: false

- name: Check A record for DC
  ansible.builtin.command: "host -t A {{ healthcheck_dc_hostname }}.{{ healthcheck_realm | lower }}"
  register: dns_a
  changed_when: false
  failed_when: false

# --- Kerberos check ---
- name: Check Kerberos ticket
  ansible.builtin.command: klist
  register: klist_result
  changed_when: false
  failed_when: false

# --- Service checks ---
- name: Check SSSD service
  ansible.builtin.systemd:
    name: sssd
  register: sssd_status
  failed_when: false

# Winbind is optional (SSSD is the preferred AD client on Linux).
- name: Check winbind service
  ansible.builtin.systemd:
    name: winbind
  register: winbind_status
  failed_when: false

- name: Check autofs service
  ansible.builtin.systemd:
    name: autofs
  register: autofs_status
  failed_when: false

- name: Check NFS server service
  ansible.builtin.systemd:
    name: nfs-server
  register: nfs_server_status
  failed_when: false

# --- NSS resolution check ---
- name: Check domain user lookup
  ansible.builtin.command: "getent passwd {{ healthcheck_test_user }}"
  register: getent_user
  changed_when: false
  failed_when: false

# --- Active NFS mounts ---
- name: Check mounted NFS shares
  ansible.builtin.command: mount -t nfs4 # noqa: command-instead-of-module
  register: nfs_mounts
  changed_when: false
  failed_when: false

# --- Network connectivity to DC ---
# These ports must be open for AD clients to function:
#   2049 - NFS file sharing (replaces SMB/CIFS for file access)
#   88   - Kerberos authentication
#   53   - DNS resolution
# Note: Port 445 (SMB) is no longer checked since file shares are NFS-only,
# but it remains open on the DC for sysvol/netlogon and domain join ops.
- name: Check connectivity to DC (port 2049)
  ansible.builtin.wait_for:
    host: "{{ healthcheck_dc_hostname }}.{{ healthcheck_realm | lower }}"
    port: 2049
    timeout: 5
  failed_when: false
  register: dc_port_2049

- name: Check connectivity to DC (port 88)
  ansible.builtin.wait_for:
    host: "{{ healthcheck_dc_hostname }}.{{ healthcheck_realm | lower }}"
    port: 88
    timeout: 5
  failed_when: false
  register: dc_port_88

- name: Check connectivity to DC (port 53)
  ansible.builtin.wait_for:
    host: "{{ healthcheck_dc_hostname }}.{{ healthcheck_realm | lower }}"
    port: 53
    timeout: 5
  failed_when: false
  register: dc_port_53

# --- Summary report ---
# Uses Jinja2 conditionals on registered results to produce a PASS/FAIL
# matrix.  The `is not failed` test works with ignore_errors: true tasks.
- name: Healthcheck summary
  ansible.builtin.debug:
    msg: |
      ===== Healthcheck Summary =====
      DNS _ldap._tcp SRV:    {{ 'PASS' if 'has SRV record' in dns_ldap.stdout else 'FAIL' }}
      DNS _kerberos._tcp SRV: {{ 'PASS' if 'has SRV record' in dns_krb.stdout else 'FAIL' }}
      DNS A record (DC):     {{ 'PASS' if 'has address' in dns_a.stdout else 'FAIL' }}
      Kerberos ticket:       {{ 'PASS' if klist_result.rc == 0 and 'Default principal' in klist_result.stdout else 'NO TICKET' }}
      SSSD service:          {{ 'RUNNING' if sssd_status.status.ActiveState | default('') == 'active' else 'NOT RUNNING' }}
      Winbind service:       {{ 'RUNNING' if winbind_status.status.ActiveState | default('') == 'active' else 'NOT RUNNING' }}
      Autofs service:        {{ 'RUNNING' if autofs_status.status.ActiveState | default('') == 'active' else 'NOT RUNNING' }}
      NFS server:            {{ 'RUNNING' if nfs_server_status.status.ActiveState | default('') == 'active' else 'NOT RUNNING' }}
      User lookup:           {{ 'PASS' if getent_user.rc == 0 else 'FAIL' }}
      DC port 2049 (NFS):    {{ 'OPEN' if dc_port_2049 is not failed else 'CLOSED' }}
      DC port 88 (Kerberos): {{ 'OPEN' if dc_port_88 is not failed else 'CLOSED' }}
      DC port 53 (DNS):      {{ 'OPEN' if dc_port_53 is not failed else 'CLOSED' }}
      NFS mounts:            {{ nfs_mounts.stdout_lines | default([]) | length }} active
      ================================

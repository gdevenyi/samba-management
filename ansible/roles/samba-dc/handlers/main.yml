# samba-dc handlers - DC-specific service handlers.
#
# Cross-role handlers (Reload systemd, Restart sssd, Reload NFS exports,
# Restart nfs-idmapd/rpc-gssd/nfs-mountd/rpc-svcgssd) live in the common
# role's handlers/main.yml and are loaded via meta/main.yml dependency.
---
- name: Reload samba-ad-dc
  ansible.builtin.systemd:
    name: "{{ samba_dc_service | default('samba-ad-dc') }}"
    state: restarted
  listen: restart samba

- name: Restart systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  listen: restart systemd-timesyncd

- name: Restart chrony
  ansible.builtin.systemd:
    name: chrony
    state: restarted
  listen: restart chrony

- name: Reload resolv
  ansible.builtin.shell: resolvconf -u || true
  changed_when: true
  listen: reload resolv

- name: Clean Samba runtime files
  ansible.builtin.shell: |
    rm -f /var/run/samba/*.pid /var/run/samba/*.tdb 2>/dev/null || true
    rm -f /var/cache/samba/*.tdb 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: true
  listen: Clean Samba runtime files

- name: Restart nfs-server
  ansible.builtin.systemd:
    name: nfs-server
    state: restarted
  listen: Restart nfs-server

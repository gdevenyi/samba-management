# samba-dc tasks - Orchestrator that includes split task files in order.
---
- name: Load distribution-specific vars
  ansible.builtin.include_vars:
    file: "vars/{{ ansible_facts['distribution'] }}.yml"

- name: Validate environment and variables
  ansible.builtin.import_tasks: assertions.yml

- name: Install packages and manage services
  ansible.builtin.import_tasks: install.yml

- name: Provision Samba AD domain
  ansible.builtin.include_tasks: provision.yml

- name: Configure services and deploy files
  ansible.builtin.import_tasks: configure.yml

- name: Configure password and lockout policies
  ansible.builtin.include_tasks: password_policy.yml

- name: Install and configure SSSD on the DC (for full NSS group resolution)
  ansible.builtin.include_tasks: sssd.yml
  when: _samba_domain_exists | default(false)

- name: Configure NSS/PAM for DC-as-client
  ansible.builtin.include_tasks: nss_pam.yml

- name: Apply sudo schema extension
  ansible.builtin.include_tasks: sudo_schema.yml
  when:
    - samba_enable_sudo_schema | bool
    - _samba_domain_exists | default(false)

- name: Verify DC is operational
  ansible.builtin.import_tasks: verify.yml

# nfs-server defaults - Default variables for the nfs-server Ansible role.
#
# Configures a domain-joined Linux machine as a dedicated NFSv4+Kerberos
# storage server.  The sssd-client role must be applied first (via the
# provision-nfs-server playbook) so the machine has a valid AD computer
# account and SSSD can resolve AD users and groups.
---
# --- File system paths (shared with samba-dc role; same defaults) ---
samba_share_base: "/data"
samba_home_base: "/home/ad"

# --- File shares ---
# Shares are managed operationally from the DC with bin/samba-automount.sh
# add-share, which creates the directory and NFS export on this storage host
# (over SSH) and publishes the AD autofs entry.  Nothing per-share is
# declared here.  See docs/SCENARIOS.md.

# --- NFS options (shared with samba-dc role; same defaults) ---
samba_nfs_sec: "krb5p"
# Whether to export samba_home_base (default /home/ad) via NFS for home directory mounts.
samba_nfs_export_homes: true
# Stable NFS filesystem id for the /home/ad export.  Empty (default) lets the
# kernel derive one from the backing device.  Set to a unique small integer
# (not 0) when /home/ad is on ZFS/Btrfs to avoid client ESTALE errors across a
# reboot or pool export/import.  Must differ from every per-share `fsid:`.
samba_nfs_homes_fsid: ""

# --- Verification ---
# How long to wait for SSSD to resolve the 'domain users' group before
# re-applying share ownership and continuing.  The default (10 retries x 3s)
# tolerates first-boot SSSD startup latency on slower hosts.
nfs_server_group_resolve_retries: 10
nfs_server_group_resolve_delay: 3

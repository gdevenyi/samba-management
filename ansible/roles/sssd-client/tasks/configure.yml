# configure.yml - Per-host SSSD configuration (homedir mode, sssd.conf, PAM).
---
# Set the effective fallback_homedir based on whether homes are created
# locally (pam_mkhomedir) or auto-mounted via NFS from the DC.
- name: Set fallback_homedir for mounted mode
  ansible.builtin.set_fact:
    sssd_effective_fallback_homedir: "{{ sssd_mounted_homedir_base }}/%u"
  when: sssd_homedir_mode == 'mounted'

- name: Set fallback_homedir for local mode
  ansible.builtin.set_fact:
    sssd_effective_fallback_homedir: "{{ sssd_fallback_homedir }}"
  when: sssd_homedir_mode == 'local'

# Deploy our template over the one generated by realm join, because
# realm's defaults don't include our custom homedir and autofs settings.
# The file must not be readable beyond SSSD's runtime identity (it may
# contain cached credentials); group/mode must match what the SSSD service
# itself converges the file to (root:sssd 0640 where the daemon runs
# unprivileged, root:root 0600 where it runs as root) -- see the shared
# task file for the full rationale.
- name: Compute converged sssd.conf ownership
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/sssd-conf-attrs.yml"

- name: Deploy sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: "{{ _common_sssd_conf_mode }}"
    owner: root
    group: "{{ _common_sssd_conf_group }}"
  notify: Restart sssd

# pam_mkhomedir automatically creates a local home directory skeleton
# on first login.  Only enable for local mode; in mounted mode the home
# dir comes from the DC via NFS.
# Check whether pam_mkhomedir is currently active in common-session so
# changed_when reflects reality rather than masking it as `false`.
- name: Check if pam_mkhomedir is currently active
  ansible.builtin.command: grep -q pam_mkhomedir /etc/pam.d/common-session
  register: _pam_mkhomedir_state
  changed_when: false
  failed_when: false

- name: Enable pam_mkhomedir (local homedirs only)
  ansible.builtin.command: pam-auth-update --enable mkhomedir
  when:
    - sssd_homedir_mode == 'local'
    - _pam_mkhomedir_state.rc != 0
  changed_when: true

- name: Disable pam_mkhomedir (mounted homedirs)
  ansible.builtin.command: pam-auth-update --disable mkhomedir
  when:
    - sssd_homedir_mode == 'mounted'
    - _pam_mkhomedir_state.rc == 0
  changed_when: true

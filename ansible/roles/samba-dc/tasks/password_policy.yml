# Configure idempotent password and account lockout policies.
# Reads current settings, compares, and only applies changes when different.
---
- name: Get current password settings
  ansible.builtin.command:
    cmd: samba-tool domain passwordsettings show
  register: _current_password_settings
  changed_when: false
  when: _samba_domain_exists | default(false)

- name: Parse current password settings
  ansible.builtin.set_fact:
    _current_pw_policy:
      complexity: >-
        {{ ((_current_password_settings.stdout | regex_findall('Password complexity: (on|off)') | list + ['off']) | first) | trim }}
      history_length: >-
        {{ ((_current_password_settings.stdout | regex_findall('Password history length: (\\d+)') | list + ['0']) | first) | trim | int }}
      min_length: >-
        {{ ((_current_password_settings.stdout | regex_findall('Minimum password length: (\\d+)') | list + ['0']) | first) | trim | int }}
      min_age: >-
        {{ ((_current_password_settings.stdout | regex_findall('Minimum password age \\(days\\): (\\d+)') | list + ['0']) | first) | trim | int }}
      max_age: >-
        {{ ((_current_password_settings.stdout | regex_findall('Maximum password age \\(days\\): (\\d+)') | list + ['0']) | first) | trim | int }}
      lockout_duration: >-
        {{ ((_current_password_settings.stdout | regex_findall('Account lockout duration \\(mins\\): (\\d+)') | list + ['0']) | first) | trim | int }}
      lockout_threshold: >-
        {{ ((_current_password_settings.stdout | regex_findall('Account lockout threshold \\(attempts\\): (\\d+)') | list + ['0']) | first) | trim | int }}
      reset_lockout_after: >-
        {{ ((_current_password_settings.stdout | regex_findall('Reset account lockout after \\(mins\\): (\\d+)') | list + ['0']) | first) | trim | int }}
  when:
    - _samba_domain_exists | default(false)
    - _current_password_settings.stdout is defined
    - _current_password_settings.stdout | length > 0

- name: Check if password policy needs updating
  ansible.builtin.set_fact:
    _password_policy_changed: >-
      {{
        (_current_pw_policy.complexity | trim != (samba_password_complexity)) or
        (_current_pw_policy.history_length | int != samba_password_history | int) or
        (_current_pw_policy.min_length | int != samba_password_min_length | int) or
        (_current_pw_policy.min_age | int != samba_password_min_age | int) or
        (_current_pw_policy.max_age | int != samba_password_max_age | int)
      }}
  when:
    - _samba_domain_exists | default(false)
    - _current_pw_policy is defined

- name: Apply password policy
  ansible.builtin.command: >
    samba-tool domain passwordsettings set
    --complexity={{ samba_password_complexity }}
    --min-pwd-length={{ samba_password_min_length }}
    --max-pwd-age={{ samba_password_max_age }}
    --min-pwd-age={{ samba_password_min_age }}
    --history-length={{ samba_password_history }}
  when:
    - _samba_domain_exists | default(false)
    - _password_policy_changed | default(false)
  changed_when: true

# Compare all three values unconditionally -- gating on threshold > 0 would
# make it impossible to ever revert the policy back to "disabled" (0).
- name: Check if account lockout policy needs updating
  ansible.builtin.set_fact:
    _lockout_policy_changed: >-
      {{
        (_current_pw_policy.lockout_duration | int != samba_account_lockout_duration | int) or
        (_current_pw_policy.lockout_threshold | int != samba_account_lockout_threshold | int) or
        (_current_pw_policy.reset_lockout_after | int != samba_account_reset_lockout_after | int)
      }}
  when:
    - _samba_domain_exists | default(false)
    - _current_pw_policy is defined

- name: Apply account lockout policy
  ansible.builtin.command: >
    samba-tool domain passwordsettings set
    --account-lockout-duration={{ samba_account_lockout_duration }}
    --account-lockout-threshold={{ samba_account_lockout_threshold }}
    --reset-account-lockout-after={{ samba_account_reset_lockout_after }}
  when:
    - _samba_domain_exists | default(false)
    - _lockout_policy_changed | default(false)
  changed_when: true

# verify.yml - Sanity-check that SSSD is resolving AD users and groups.
#
# Retry tunables come from defaults/main.yml.  SSSD may need a moment to
# initialise its connection to the DC after first startup.
---
- name: Verify domain user lookup (getent)
  ansible.builtin.command: "getent passwd {{ sssd_admin_user }}"
  register: getent_check
  changed_when: false
  retries: "{{ sssd_user_resolve_retries }}"
  delay: "{{ sssd_user_resolve_delay }}"
  until: getent_check.rc == 0

- name: Verify domain group lookup
  ansible.builtin.command: "getent group 'domain users'"
  register: getent_group
  changed_when: false
  retries: "{{ sssd_group_resolve_retries }}"
  delay: "{{ sssd_group_resolve_delay }}"
  until: getent_group.rc == 0

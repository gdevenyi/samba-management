# samba-dc handlers - Service restart handlers triggered by config changes.
---
- name: Reload samba-ad-dc
  ansible.builtin.systemd:
    name: "{{ samba_dc_service | default('samba-ad-dc') }}"
    state: restarted
  listen: restart samba

- name: Restart systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  listen: restart systemd-timesyncd

- name: Reload resolv
  ansible.builtin.shell: resolvconf -u || true
  changed_when: true
  listen: reload resolv

- name: Clean Samba runtime files
  ansible.builtin.shell: |
    rm -f /var/run/samba/*.pid /var/run/samba/*.tdb 2>/dev/null || true
    rm -f /var/cache/samba/*.tdb 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: true
  listen: Clean Samba runtime files

- name: Reload NFS exports
  ansible.builtin.command: exportfs -ra
  changed_when: true
  listen: Reload NFS exports

- name: Restart nfs-server
  ansible.builtin.systemd:
    name: nfs-server
    state: restarted
  listen: Restart nfs-server

- name: Restart nfs-idmapd
  ansible.builtin.systemd:
    name: nfs-idmapd
    state: restarted
  listen: Restart nfs-idmapd

- name: Restart rpc-gssd
  ansible.builtin.systemd:
    name: rpc-gssd
    state: restarted
  listen: Restart rpc-gssd

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true


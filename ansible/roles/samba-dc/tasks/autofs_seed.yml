# autofs_seed.yml - Seed AD-stored autofs maps under OU=automount.
#
# Idempotent: every entry is checked with ldbsearch and only created if it
# doesn't exist; pre-existing entries (including manual additions via
# bin/samba-automount.sh) are left untouched.  No schema modification is
# needed -- Samba AD already ships nisMap/nisObject in its default schema.
#
# All the AD objects we seed are uniform "compute DN + emit LDIF + check +
# ldbadd if missing" -- we build a single list of {dn, ldif} dicts in
# set_fact and run the check/create as two loops, instead of 8+ pairs of
# hard-coded shell tasks.
---
- name: Compute domain base DN (autofs)
  ansible.builtin.set_fact:
    _autofs_domain_dn: "{{ samba_realm | upper | regex_replace('\\.', ',DC=') | regex_replace('^', 'DC=') }}"

- name: Set autofs DN facts
  ansible.builtin.set_fact:
    _autofs_base_dn: "OU=automount,{{ _autofs_domain_dn }}"
    _autofs_nfs_server: "{{ samba_nfs_server if samba_nfs_server else ansible_fqdn }}"
    _autofs_homes_nfs_server: "{{ samba_nfs_homes_server if samba_nfs_homes_server else (samba_nfs_server if samba_nfs_server else ansible_fqdn) }}"

- name: Set autofs homes target fact
  ansible.builtin.set_fact:
    _autofs_homes_target: "{{ _autofs_homes_nfs_server }}:{{ samba_home_base }}/&"

# --- Build the seed list ----------------------------------------------------
# Each entry is a dict with `dn` and `ldif`; the body of `ldif` is the LDIF
# minus the `dn:` line (which we prepend separately during the add task).
- name: Initialise base autofs seed entries
  ansible.builtin.set_fact:
    _autofs_entries:
      - dn: "{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: organizationalUnit
          ou: automount
      - dn: "CN=auto.master,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisMap
          cn: auto.master
          nisMapName: auto.master
      - dn: "CN={{ samba_autofs_shares_mount }},CN=auto.master,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisObject
          cn: {{ samba_autofs_shares_mount }}
          nisMapName: auto.master
          nisMapEntry: auto.shares --timeout={{ samba_autofs_shares_timeout }}
      - dn: "CN=auto.shares,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisMap
          cn: auto.shares
          nisMapName: auto.shares

- name: Append home-mount autofs entries when exporting homes
  ansible.builtin.set_fact:
    _autofs_entries: "{{ _autofs_entries + _autofs_homes_entries }}"
  vars:
    _autofs_homes_entries:
      - dn: "CN={{ samba_autofs_homes_mount }},CN=auto.master,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisObject
          cn: {{ samba_autofs_homes_mount }}
          nisMapName: auto.master
          nisMapEntry: auto.home --timeout={{ samba_autofs_homes_timeout }}
      - dn: "CN=auto.home,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisMap
          cn: auto.home
          nisMapName: auto.home
      - dn: "CN=*,CN=auto.home,{{ _autofs_base_dn }}"
        ldif: |
          objectClass: top
          objectClass: nisObject
          cn: *
          nisMapName: auto.home
          nisMapEntry: -fstype=nfs4,sec={{ samba_nfs_sec }} {{ _autofs_homes_target }}
  when: samba_nfs_export_homes | bool

- name: Append per-share autofs entries
  ansible.builtin.set_fact:
    _autofs_entries: "{{ _autofs_entries + [_autofs_entry] }}"
  vars:
    _autofs_entry:
      dn: "CN={{ item.name }},CN=auto.shares,{{ _autofs_base_dn }}"
      ldif: |
        objectClass: top
        objectClass: nisObject
        cn: {{ item.name }}
        nisMapName: auto.shares
        nisMapEntry: -fstype=nfs4,sec={{ samba_nfs_sec }} {{ _autofs_nfs_server }}:{{ samba_share_base }}/{{ item.name }}
  loop: "{{ samba_shares }}"
  loop_control:
    label: "{{ item.name }}"

# --- Check existence and create missing entries -----------------------------
- name: Check which autofs entries already exist
  ansible.builtin.shell: |
    set -o pipefail
    ldbsearch -H /var/lib/samba/private/sam.ldb -b "{{ item.dn }}" -s base dn 2>/dev/null | grep -c '^dn:' || true
  args:
    executable: /bin/bash
  register: _autofs_exists
  changed_when: false
  loop: "{{ _autofs_entries }}"
  loop_control:
    label: "{{ item.dn }}"

- name: Create missing autofs entries
  ansible.builtin.shell: |
    set -o pipefail
    cat <<'LDIF' | ldbadd -H /var/lib/samba/private/sam.ldb
    dn: {{ item.item.dn }}
    {{ item.item.ldif }}
    LDIF
  args:
    executable: /bin/bash
  when: item.stdout | int == 0
  changed_when: true
  loop: "{{ _autofs_exists.results }}"
  loop_control:
    label: "{{ item.item.dn }}"

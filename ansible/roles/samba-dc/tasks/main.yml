# samba-dc tasks - Main task list for provisioning a Samba AD Domain Controller.
#
# Order matters: install packages, disable conflicting services, provision
# the domain, deploy configuration files, create shares, and finally verify.
# The provisioning tasks are gated by checking for sam.ldb so the role is
# idempotent and safe to re-run.
---
# --- Pre-flight validation ---

# NetBIOS names have a 15-character limit; PDC/BDC are NT4-era reserved
# names that conflict with Samba AD DC operation.
- name: Validate hostname length
  ansible.builtin.assert:
    that:
      - ansible_hostname | length <= 15
      - ansible_hostname | lower not in ['pdc', 'bdc']
    fail_msg: "Hostname must be <= 15 chars and not use NT4 reserved names (PDC, BDC)"

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - samba_realm | length > 0
      - samba_domain | length > 0
      - samba_admin_password | length > 0
    fail_msg: "samba_realm, samba_domain, and samba_admin_password are required"

# Samba AD DC requires that the FQDN resolves to the machine's LAN IP,
# not 127.0.0.1.  A loopback entry in /etc/hosts will break Kerberos and
# DNS registration.
- name: Check /etc/hosts resolves FQDN to LAN IP
  ansible.builtin.command: "getent hosts {{ ansible_fqdn }}"
  register: hosts_check
  changed_when: false
  failed_when: "'127.0.0.1' in hosts_check.stdout"

# --- Package installation ---
# acl and attr are needed for Windows ACL and extended attribute support
# (required by the acl_xattr VFS module).
- name: Install samba-ad-dc packages
  ansible.builtin.apt:
    name:
      - samba-ad-dc
      - krb5-user
      - bind9-dnsutils
      - acl
      - attr
      - ntp
    state: present
    update_cache: true

# --- Service management ---
# On Debian/Ubuntu, the samba-ad-dc package also enables smbd, nmbd, and
# winbind.  These MUST be stopped and masked because samba-ad-dc provides
# all of these functions in a single process.  Running them simultaneously
# causes port conflicts and data corruption.
- name: Disable and mask standard Samba services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  loop:
    - smbd
    - nmbd
    - winbind
  ignore_errors: true

- name: Unmask and enable samba-ad-dc service
  ansible.builtin.systemd:
    name: samba-ad-dc
    masked: false
    enabled: true

# --- Provisioning preparation ---
# smb.conf must be absent for `samba-tool domain provision` to succeed.
# We back up any existing config first.
- name: Backup existing smb.conf
  ansible.builtin.copy:
    src: /etc/samba/smb.conf
    dest: "/etc/samba/smb.conf.orig"
    remote_src: true
    mode: "0644"
  ignore_errors: true

- name: Remove existing smb.conf for provisioning
  ansible.builtin.file:
    path: /etc/samba/smb.conf
    state: absent

# Check if the domain has already been provisioned by looking for sam.ldb,
# the main AD database file.  This gates all first-run-only tasks below.
- name: Check if domain is already provisioned
  ansible.builtin.stat:
    path: /var/lib/samba/private/sam.ldb
  register: sam_ldb

# SECURITY: the admin password is written to a temp file with mode 0600
# (root-only readable) and deleted immediately after provisioning.
# no_log: true prevents the password from appearing in Ansible output.
- name: Write admin password to temp file
  ansible.builtin.copy:
    content: "{{ samba_admin_password }}"
    dest: /tmp/.samba-admin-pass
    mode: "0600"
  when: not sam_ldb.stat.exists
  no_log: true

# --- Domain provisioning ---
# --use-rfc2307 enables POSIX attributes (uidNumber, gidNumber) in AD
# for consistent UID/GID mapping across Linux clients.
# --option=interfaces binds Samba to specific interfaces only.
# The | quote filter safely handles passwords with shell-special chars.
- name: Provision Samba AD DC
  ansible.builtin.command: >
    samba-tool domain provision
    --server-role={{ samba_server_role }}
    --use-rfc2307
    --dns-backend={{ samba_dns_backend }}
    --realm={{ samba_realm }}
    --domain={{ samba_domain }}
    --adminpass={{ samba_admin_password | quote }}
    --option=interfaces=lo {{ ansible_default_ipv4.interface }}
    --option="bind interfaces only=yes"
  when: not sam_ldb.stat.exists
  no_log: true

# Clean up the temp password file immediately.
- name: Remove admin password temp file
  ansible.builtin.file:
    path: /tmp/.samba-admin-pass
    state: absent
  when: not sam_ldb.stat.exists

# Deploy the krb5.conf that samba-tool generated during provisioning.
# This includes the correct KDC and admin_server entries for the realm.
- name: Deploy krb5.conf from provision output
  ansible.builtin.copy:
    src: /var/lib/samba/private/krb5.conf
    dest: /etc/krb5.conf
    remote_src: true
    mode: "0644"
  when: not sam_ldb.stat.exists

# Deploy the custom smb.conf template (which includes shares, recycle, etc.)
# over the one generated by samba-tool.
- name: Deploy smb.conf from template
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    mode: "0644"
    owner: root
    group: root
  notify: restart samba

# --- NTP configuration ---
# The ntp_signd socket allows Samba to sign NTP responses for AD-joined
# Windows clients, which is required for proper time synchronisation.
- name: Configure NTP
  block:
    - name: Create ntp_signd directory
      ansible.builtin.file:
        path: /var/lib/samba/ntp_signd
        state: directory
        owner: root
        # The ntp group needs read access to the signing socket.
        group: ntp
        mode: "0750"

    - name: Deploy ntp.conf
      ansible.builtin.template:
        src: ntp.conf.j2
        dest: /etc/ntp.conf
        mode: "0644"
        owner: root
        group: root
      notify: restart ntp
  when: ansible_facts['distribution'] == 'Ubuntu'

# --- DNS resolver configuration ---
# Replace systemd-resolved with a static resolv.conf pointing to the
# local Samba DNS server.  This is required because Samba's INTERNAL_DNS
# does not register its zones with an external resolver.
- name: Configure DNS resolver
  block:
    - name: Remove systemd-resolved resolv.conf symlink
      ansible.builtin.file:
        path: /etc/resolv.conf
        state: absent

    - name: Deploy resolv.conf pointing to local Samba DNS
      ansible.builtin.copy:
        content: |
          nameserver 127.0.0.1
          search {{ samba_realm | lower }}
        dest: /etc/resolv.conf
        mode: "0644"
        owner: root
        group: root

    - name: Disable systemd-resolved
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: false
        state: stopped
      ignore_errors: true
  when: ansible_facts['distribution'] == 'Ubuntu'

# --- Start the DC service ---
- name: Start samba-ad-dc
  ansible.builtin.systemd:
    name: samba-ad-dc
    state: started

# --- Post-provisioning tasks (first run only) ---

# Create a reverse DNS zone so PTR lookups work.  The zone name is derived
# from the DC's IP address by reversing the first three octets (e.g.
# 10.0.0.x -> 0.0.10.in-addr.arpa).
- name: Create reverse DNS zone
  ansible.builtin.command: >
    samba-tool dns zonecreate {{ ansible_hostname }}.{{ samba_realm | lower }}
    {{ ansible_default_ipv4.address.split('.')[2] }}.{{ ansible_default_ipv4.address.split('.')[1] }}.{{ ansible_default_ipv4.address.split('.')[0] }}.in-addr.arpa
    -U Administrator --password={{ samba_admin_password | quote }}
  when: not sam_ldb.stat.exists
  ignore_errors: true
  no_log: true

# Add a PTR record for the DC itself in the reverse zone.
- name: Add PTR record for DC
  ansible.builtin.command: >
    samba-tool dns add {{ ansible_hostname }}.{{ samba_realm | lower }}
    {{ ansible_default_ipv4.address.split('.')[2] }}.{{ ansible_default_ipv4.address.split('.')[1] }}.{{ ansible_default_ipv4.address.split('.')[0] }}.in-addr.arpa
    {{ ansible_default_ipv4.address.split('.')[3] }} PTR {{ ansible_fqdn }}
    -U Administrator --password={{ samba_admin_password | quote }}
  when: not sam_ldb.stat.exists
  ignore_errors: true
  no_log: true

# Create organisational units for structured AD object management.
- name: Create organizational units
  ansible.builtin.command: >
    samba-tool ou create OU={{ item }}
    --description="Organizational Unit for {{ item }}"
  loop: "{{ samba_ous }}"
  when: not sam_ldb.stat.exists
  ignore_errors: true

# --- Share provisioning ---
# The base directory exists so shares can be created as subdirectories.
- name: Create share base directory
  ansible.builtin.file:
    path: "{{ samba_share_base }}"
    state: directory
    mode: "0755"
    owner: root
    group: "domain users"

# Each share directory is group-owned by "domain users" with 0770 so
# that domain members can read/write.  Fine-grained ACLs are managed
# via smbcacls or Windows RSAT after provisioning.
- name: Create share directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "0770"
    owner: root
    group: "domain users"
  loop: "{{ samba_shares }}"

# --- Password policy ---
# Applied once during provisioning; adjust via samba-user.sh afterwards.
- name: Configure password policy
  ansible.builtin.shell: >
    samba-tool domain passwordsettings set
    --complexity={{ samba_password_complexity }}
    --min-pwd-length={{ samba_password_min_length }}
    --max-pwd-age={{ samba_password_max_age }}
    --min-pwd-age={{ samba_password_min_age }}
    --history-length={{ samba_password_history }}
  when: not sam_ldb.stat.exists

# --- Verification ---
# Retry DNS SRV checks a few times because Samba may need a moment to
# register its records after first startup.
- name: Verify DNS SRV records
  ansible.builtin.command: "host -t SRV _ldap._tcp.{{ samba_realm | lower }}"
  register: dns_srv
  changed_when: false
  retries: 5
  delay: 2
  until: "'has SRV record' in dns_srv.stdout"

# Test that Kerberos authentication works end-to-end.
- name: Verify Kerberos authentication
  ansible.builtin.expect:
    command: "kinit Administrator"
    responses:
      "Password for Administrator@{{ samba_realm }}:": "{{ samba_admin_password }}"
  no_log: true
  changed_when: false
  ignore_errors: true

# Verify the netlogon share is accessible (proves SMB + authentication work).
# PASSWD env var avoids interactive password prompt in smbclient.
- name: Verify netlogon share
  ansible.builtin.command: "smbclient //localhost/netlogon -U Administrator -c ls"
  environment:
    PASSWD: "{{ samba_admin_password }}"
  changed_when: false
  no_log: true

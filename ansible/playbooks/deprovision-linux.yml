# deprovision-linux.yml - Ansible playbook to remove a Linux client from the AD domain.
#
# Reverses the provisioning done by provision-linux-sssd.yml: leaves the
# domain, stops/disables SSSD + autofs, removes SSSD and autofs configuration.
# failed_when:false / state=absent are used so the playbook is idempotent
# even on partially-provisioned clients.
---
- name: Deprovision Linux client from domain
  hosts: linux_clients
  become: true
  tasks:
    - name: Validate domain variable is defined
      ansible.builtin.assert:
        that:
          - sssd_domain is defined
        fail_msg: "sssd_domain must be defined"

    # realm leave removes the computer object from AD and cleans up local
    # config.  rc==0 means the host actually left; a non-zero rc (already
    # unjoined, DC unreachable) is tolerated and reported as no change.
    - name: Leave the domain
      ansible.builtin.command: "realm leave {{ sssd_domain }}"
      register: _realm_leave
      failed_when: false
      changed_when: _realm_leave.rc == 0

    # Best-effort removal of the client's A/PTR from Samba DNS.  realm leave
    # removes the computer object but not the DNS records (whether registered
    # explicitly via sssd_register_dns or by SSSD dynamic DNS), so they'd
    # otherwise linger in the AD zone.  Run unconditionally so records from
    # either mechanism are cleaned up; the delete keys off hostname + IP and
    # the PTR value is the AD name (hostname + sssd_domain), matching how
    # dns-register.yml writes them.  failed_when:false because the record or
    # the DC may already be gone.  Mirrors deprovision-nfs-server.yml.
    - name: Remove client A record from Samba DNS
      ansible.builtin.command:
        argv:
          - samba-tool
          - dns
          - delete
          - "{{ groups['dc'][0] }}"
          - "{{ sssd_domain }}"
          - "{{ ansible_facts['hostname'] }}"
          - A
          - "{{ ansible_facts['default_ipv4'].address }}"
          - "-U"
          - Administrator
      environment:
        PASSWD: "{{ sssd_admin_password }}"
      delegate_to: "{{ groups['dc'][0] }}"
      become: true
      register: _deprov_dns_a
      failed_when: false
      # rc==0 means the record existed and was deleted; non-zero (record
      # already gone, DC unreachable) is tolerated and reported unchanged.
      changed_when: _deprov_dns_a.rc == 0
      no_log: true

    - name: Compute client's reverse zone name
      ansible.builtin.set_fact:
        _deprov_reverse_zone: >-
          {%- set o = ansible_facts['default_ipv4'].address.split('.') -%}
          {{ o[2] }}.{{ o[1] }}.{{ o[0] }}.in-addr.arpa

    - name: Remove client PTR record from Samba DNS
      ansible.builtin.command:
        argv:
          - samba-tool
          - dns
          - delete
          - "{{ groups['dc'][0] }}"
          - "{{ _deprov_reverse_zone }}"
          - "{{ ansible_facts['default_ipv4'].address.split('.')[3] }}"
          - PTR
          - "{{ ansible_facts['hostname'] }}.{{ sssd_domain }}"
          - "-U"
          - Administrator
      environment:
        PASSWD: "{{ sssd_admin_password }}"
      delegate_to: "{{ groups['dc'][0] }}"
      become: true
      register: _deprov_dns_ptr
      failed_when: false
      # Same tolerance as the A-record delete above.
      changed_when: _deprov_dns_ptr.rc == 0
      no_log: true

    - name: Stop and disable autofs
      ansible.builtin.systemd:
        name: autofs
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable SSSD
      ansible.builtin.systemd:
        name: sssd
        state: stopped
        enabled: false
      failed_when: false

    # Socket-activated responder sockets are enabled by the sssd package and by
    # the sssd-client role.  If left enabled after sssd.service is stopped and
    # sssd.conf removed, systemd would re-activate a responder against a
    # missing config on the next NSS/PAM/etc. lookup -> noise + errors.  Tear
    # them down alongside the main service.  failed_when:false keeps the
    # playbook idempotent on partially-provisioned hosts.
    - name: Stop and disable SSSD responder sockets
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - sssd-nss.socket
        - sssd-pam.socket
        - sssd-sudo.socket
        - sssd-ssh.socket
        - sssd-autofs.socket
        - sssd-pac.socket
      failed_when: false

    # sssd.conf contains cached credentials; always remove it on deprovision.
    - name: Remove sssd.conf
      ansible.builtin.file:
        path: /etc/sssd/sssd.conf
        state: absent

    # Remove the automount nsswitch routing so any local autofs reinstall
    # doesn't try to look up maps via a (now-disabled) SSSD.
    - name: Remove SSSD autofs nsswitch routing
      ansible.builtin.lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^automount:'
        state: absent
      failed_when: false

    - name: Remove SSSD sudoers nsswitch routing
      ansible.builtin.lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^sudoers:'
        state: absent
      failed_when: false

    # Without this, the client would keep routing AD-domain DNS queries at
    # the (possibly decommissioned) DC after leaving the domain.
    - name: Remove AD DNS routing drop-in
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d/samba-ad.conf
        state: absent
      register: _deprov_dns_dropin

    # Only when the drop-in was actually removed -- an already-clean host
    # (re-run) doesn't need its resolver bounced.
    - name: Restart systemd-resolved to drop the AD DNS routing # noqa: no-handler
      ansible.builtin.systemd:
        name: systemd-resolved
        state: restarted
      when: _deprov_dns_dropin is changed
      failed_when: false

    # sshd would otherwise keep invoking sss_ssh_authorizedkeys against a
    # stopped SSSD on every login attempt.
    - name: Remove sshd SSSD AuthorizedKeysCommand snippet
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d/sssd.conf
        state: absent
      register: _deprov_sshd_snippet

    # Not a handler on purpose: deprovision is a linear one-shot teardown
    # and the restart must happen even if later tasks fail.
    - name: Restart sshd after removing SSSD snippet # noqa: no-handler
      ansible.builtin.systemd:
        name: ssh
        state: restarted
      when: _deprov_sshd_snippet is changed
      failed_when: false

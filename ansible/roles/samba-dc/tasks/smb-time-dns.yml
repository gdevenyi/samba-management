# smb-time-dns.yml - Core DC services: smb.conf, time sync, DNS resolver.
#
# Runs every play; handlers fire to restart the affected services if a
# file actually changed.  Finishes by starting samba-ad-dc.
---
- name: Deploy smb.conf from template
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    mode: "0644"
    owner: root
    group: root
  notify: restart samba

# Kerberos needs accurate time.  We configure whichever time daemon the image
# ships: systemd-timesyncd on 22.04/24.04 and Debian 12, chrony on Ubuntu 26.04
# cloud images (where systemd-timesyncd is not installed).  Detected at runtime
# so neither package has to be force-installed over the image default.
- name: Configure time synchronization
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']
  block:
    - name: Gather service facts to detect the available time daemon
      ansible.builtin.service_facts:

    - name: Configure systemd-timesyncd
      when: "'systemd-timesyncd.service' in ansible_facts.services"
      block:
        - name: Deploy systemd-timesyncd configuration
          ansible.builtin.copy:
            content: |
              [Time]
              NTP={{ samba_ntp_servers | join(' ') }}
            dest: /etc/systemd/timesyncd.conf
            mode: "0644"
            owner: root
            group: root
          notify: restart systemd-timesyncd

        - name: Enable and start systemd-timesyncd
          ansible.builtin.systemd:
            name: systemd-timesyncd
            enabled: true
            state: started

    - name: Configure chrony
      when: "'systemd-timesyncd.service' not in ansible_facts.services"
      block:
        - name: Deploy chrony NTP sources
          ansible.builtin.copy:
            content: |
              # Managed by samba-dc role. NTP sources for AD Kerberos time sync.
              {% for _ntp in samba_ntp_servers %}
              server {{ _ntp }} iburst
              {% endfor %}
            dest: /etc/chrony/conf.d/samba-ntp.conf
            mode: "0644"
            owner: root
            group: root
          notify: restart chrony

        - name: Enable and start chrony
          ansible.builtin.systemd:
            name: chrony
            enabled: true
            state: started

# Keep systemd-resolved running and forward all queries into Samba's internal
# DNS (127.0.0.1) via a resolved.conf.d drop-in, rather than clobbering
# /etc/resolv.conf and disabling resolved.  There is no port conflict: Samba
# binds 127.0.0.1:53 (interfaces = lo <iface> + bind interfaces only) while
# resolved's stub listens on 127.0.0.53:53.  Samba is authoritative for the AD
# zone and forwards everything else to samba_dns_forwarders.
- name: Configure DNS resolver (forward through systemd-resolved to Samba)
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']
  block:
    # resolved must be running before /run/systemd/resolve/stub-resolv.conf
    # (the symlink target below) is guaranteed to exist.
    - name: Ensure systemd-resolved is enabled and running
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: true
        state: started

    - name: Ensure systemd-resolved drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Route DC DNS through Samba internal DNS
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/samba-dc.conf
        mode: "0644"
        owner: root
        group: root
        content: |
          # Managed by samba-dc role -- do not edit by hand.
          # The DC resolves through its own Samba internal DNS (127.0.0.1),
          # which is authoritative for the AD zone and forwards the rest to
          # samba_dns_forwarders.  "~." forces ALL queries through Samba even
          # when the link (DHCP) advertises its own resolver.
          [Resolve]
          DNS=127.0.0.1
          Domains={{ samba_realm | lower }} ~.
          DNSStubListener=yes
      notify: Restart systemd-resolved

    # Migration for DCs provisioned by the old code path, where /etc/resolv.conf
    # is a static regular file (nameserver 127.0.0.1) rather than the resolved
    # stub symlink.  state:link is idempotent once it already points at the
    # stub, so steady-state re-runs report no change.
    - name: Point /etc/resolv.conf back at the systemd-resolved stub
      ansible.builtin.file:
        src: /run/systemd/resolve/stub-resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true

- name: Flush handlers before service start
  ansible.builtin.meta: flush_handlers

# Stale runtime files (pid/tdb) are only "stale" while samba-ad-dc is NOT
# running -- deleting them from under a live service breaks systemd's
# MAINPID tracking and can corrupt Samba's runtime tdb state.  Check first;
# on re-runs the service is typically already active and cleanup is skipped.
# noqa below: this is a status *query*, not state management -- the systemd
# module cannot report is-active without also asserting a state.
- name: Check whether samba-ad-dc is currently active # noqa: command-instead-of-module
  ansible.builtin.command: systemctl is-active {{ samba_dc_service }}
  register: _samba_dc_active
  changed_when: false
  failed_when: false
  when: samba_cleanup_runtime_files | default(true) | bool

- name: Clean stale Samba runtime files
  ansible.builtin.command: /bin/true
  notify: Clean Samba runtime files
  changed_when: true
  when:
    - samba_cleanup_runtime_files | default(true) | bool
    - _samba_dc_active.rc != 0

- name: Flush cleanup handler
  ansible.builtin.meta: flush_handlers
  when: samba_cleanup_runtime_files | default(true) | bool

- name: Start samba-ad-dc
  ansible.builtin.systemd:
    name: "{{ samba_dc_service }}"
    state: started

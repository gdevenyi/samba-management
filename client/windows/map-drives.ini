# map-drives.ini - Drive mapping configuration for Windows logon script.
#
# Format:  <AD Group Name> = <UNC path>, <drive letter>:
#
# Only the [GroupMapping] section is processed by map-drives.ps1.
# Group names must match the sAMAccountName of the AD group exactly
# (without the DOMAIN\ prefix).
#
# SECURITY: This file is typically placed in the NETLOGON share so it is
# readable by all authenticated domain users.  Do NOT include sensitive
# paths or credentials here.
[GroupMapping]
Domain Users = \\dc01\public, Z:
Finance = \\dc01\finance, F:
DevOps = \\dc01\devops, D:

# autofs-client tasks - Standalone autofs configuration for CIFS share mounting.
#
# A lightweight role that only installs autofs/cifs-utils and deploys the
# map files.  Use when the client is already domain-joined and you just
# need to add or update share mounts.
---
- name: Install autofs and cifs-utils
  ansible.builtin.apt:
    name:
      - autofs
      - cifs-utils
    state: present
    update_cache: true

# /etc/auto.master.d/ is the standard location for autofs master map
# snippets on Debian/Ubuntu systems.
- name: Create autofs master directory
  ansible.builtin.file:
    path: /etc/auto.master.d
    state: directory
    mode: "0755"

# Master map: tells autofs to manage the base mount point using the
# auto.shares map file with the configured idle timeout.
- name: Deploy autofs master map
  ansible.builtin.template:
    src: shares.autofs.j2
    dest: /etc/auto.master.d/shares.autofs
    mode: "0644"
  notify: Restart autofs

# The shares map: each line defines a share with CIFS mount options
# including Kerberos authentication and multiuser mode.
- name: Deploy autofs shares map
  ansible.builtin.template:
    src: auto.shares.j2
    dest: /etc/auto.shares
    mode: "0644"
  notify: Restart autofs

- name: Create autofs mount base
  ansible.builtin.file:
    path: "{{ autofs_base }}"
    state: directory
    mode: "0755"

- name: Enable and start autofs
  ansible.builtin.systemd:
    name: autofs
    enabled: true
    state: started

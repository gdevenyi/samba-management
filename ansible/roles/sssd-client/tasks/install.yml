# install.yml - Package installation and DNS pointer for the domain.
#
# Packages:
#   sssd-ad:    SSSD Active Directory provider
#   realmd:     High-level domain join tool (wraps adcli/sssd)
#   adcli:      Low-level AD join tool (creates computer object)
#   libnss-sss/libpam-sss: NSS and PAM modules for identity resolution
#   autofs/nfs-common: on-demand NFSv4 mounting with Kerberos auth
#   libsss-sudo: SSSD plugin for AD-stored sudo rules
---
- name: Install SSSD and dependencies
  ansible.builtin.apt:
    name:
      - sssd-ad
      - sssd-tools
      - realmd
      - adcli
      - krb5-user
      - samba-common-bin
      - libnss-sss
      - libpam-sss
      - autofs
      - nfs-common
      - libsss-sudo
      # bind9-dnsutils provides `host`, used by the deployed
      # domain-healthcheck.sh for the DNS SRV/A checks.
      - bind9-dnsutils
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

# DNS must resolve the AD domain before realm discover/join can talk to the DC.
#
# The site DNS/DHCP is externally owned and cannot be modified, so we have
# to override resolution *here*.  The override must be persistent across
# reboot and DHCP renewal -- site DHCP will keep restoring its own
# resolver settings on every lease refresh, so a runtime-only resolvectl
# call would last only until the next reboot.
#
# Persistent: systemd-resolved drop-in under /etc/systemd/resolved.conf.d/
# with Domains=~<realm> (the ~ prefix marks it as a *routing* domain --
# only queries inside the AD zone go to the DC, everything else continues
# to use whatever resolver DHCP supplies).
#
# Immediate: the resolvectl pair below applies the same override to the
# running stub-resolver without a reload, so realm join / SSSD startup in
# the rest of this play can use the new DNS right away.
- name: Ensure systemd-resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"
    owner: root
    group: root

# systemd-resolved's DNS= takes an IP address, not a name.  The inventory
# may list the DC by FQDN (production hosts.yml does), so resolve the IP
# explicitly: prefer the operator-set sssd_dc_ip, then the DC's gathered
# default IPv4, then ansible_host, and only fall back to the raw inventory
# name (which is only correct when the inventory uses bare IPs, as the
# test harness does).
- name: Resolve DC IP for DNS routing
  ansible.builtin.set_fact:
    _sssd_dc_ip: >-
      {{ sssd_dc_ip
         | default(hostvars[groups['dc'][0]].ansible_facts['default_ipv4'].address
         | default(hostvars[groups['dc'][0]].ansible_host
         | default(groups['dc'][0]))) }}

- name: Assert the resolved DC address is an IPv4 address
  ansible.builtin.assert:
    that:
      - _sssd_dc_ip is match('^([0-9]{1,3}\.){3}[0-9]{1,3}$')
    fail_msg: >-
      Cannot determine the DC's IP address ({{ _sssd_dc_ip }} is not an IPv4
      address).  Set sssd_dc_ip in group_vars, or ensure facts were gathered
      on the DC in the same run, or set ansible_host to an IP for the DC.

# Both forward and reverse AD lookups must go to the DC:
#   - Forward: <realm> (no leading ~) -- this serves *two* purposes that
#     a pure routing domain (~realm) would not: it is also a *search*
#     domain, so short names from the AD zone (autofs map entries like
#     `storage01`, AD-issued hostnames in keytabs, etc.) get expanded to
#     storage01.<realm> before lookup.  Without the search behaviour
#     autofs's add_host_addrs() fails with "Temporary failure in name
#     resolution" and Kerberos NFS mounts never happen.
#   - Reverse: ~<rev>.in-addr.arpa -- pure routing.  This covers
#     rpc.gssd's reverse resolution of the NFS server IP (the site DNS
#     has no PTR records for the AD subnet), and there is no notion of
#     a "search" suffix for in-addr.arpa, so the ~ prefix is correct.
# Everything outside the AD/reverse zones stays on the site DNS that DHCP
# supplies because we don't claim ~. (the catch-all routing domain).
- name: Compute DC subnet's reverse-zone name for resolved Domains=
  ansible.builtin.set_fact:
    _sssd_dc_reverse_zone: >-
      {%- set o = _sssd_dc_ip.split('.') -%}
      {{ o[2] }}.{{ o[1] }}.{{ o[0] }}.in-addr.arpa

- name: Deploy persistent AD DNS routing drop-in
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/samba-ad.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      # Managed by sssd-client role -- do not edit by hand.
      # Routes AD-domain queries (forward and reverse) to the DC; site DNS
      # still wins for everything else, so this is safe when the site
      # resolver is the one shipped by DHCP.
      [Resolve]
      DNS={{ _sssd_dc_ip }}
      Domains={{ sssd_domain }} ~{{ _sssd_dc_reverse_zone }}
  notify: Reload systemd-resolved

- name: Set DNS server to DC for domain resolution (immediate effect)
  ansible.builtin.shell: >-
    resolvectl dns {{ ansible_facts['default_ipv4']['interface'] }} {{ _sssd_dc_ip }}
    && resolvectl domain {{ ansible_facts['default_ipv4']['interface'] }} {{ sssd_domain }}
  args:
    executable: /bin/bash
  changed_when: true

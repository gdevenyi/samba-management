# samba-dc defaults - Default variables for the samba-dc Ansible role.
#
# All values here can be overridden by group_vars or host_vars.
# Distribution-specific vars (packages, service names) come from vars/{{ distro }}.yml.
---
# --- Domain identity ---
samba_realm: "EXAMPLE.INTERNAL"
samba_domain: "EXAMPLE"
samba_netbios: "EXAMPLE"
samba_admin_password: ""

# --- Samba server configuration ---
samba_dns_backend: "SAMBA_INTERNAL"
# Upstream resolvers for queries outside the AD zone (Samba INTERNAL_DNS
# backend accepts a space-separated list; Samba tries them in order).
samba_dns_forwarders:
  - "8.8.8.8"
samba_server_role: "dc"
samba_use_rfc2307: true
samba_tls_enabled: false

# --- File system paths ---
samba_share_base: "/data"
samba_home_base: "/home/ad"
samba_default_shell: "/bin/bash"

# --- NTP servers (Kerberos requires accurate time sync) ---
samba_ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# --- Organizational Units to create in AD ---
samba_ous:
  - "Users"
  - "Groups"
  - "Computers"
  - "Shares"
  - "SUDOers"

# --- File shares ---
# Shares are managed operationally on the DC with bin/samba-automount.sh
# add-share (directory + NFS export + AD autofs entry in one command), not
# declaratively here.  See docs/SCENARIOS.md.

# --- NFS server configuration ---
# Kerberos security flavour: krb5 (auth), krb5i (auth+integrity), krb5p (auth+integrity+privacy)
samba_nfs_sec: "krb5p"
# Whether to export samba_home_base (default /home/ad) via NFS for home directory mounts.
samba_nfs_export_homes: true
# Stable NFS filesystem id for the /home/ad export.  Empty (default) lets the
# kernel derive one from the backing device.  Set to a unique small integer
# (not 0) when /home/ad is on ZFS/Btrfs to avoid client ESTALE errors across a
# reboot or pool export/import.  Must differ from every per-share `fsid:`.
samba_nfs_homes_fsid: ""
# Hostname of the NFS server for autofs map entries stored in AD.
# Empty string (default) means the DC serves NFS.
# Set to a hostname (e.g. "storage01") to offload NFS to a dedicated
# storage server provisioned via the nfs-server role.
samba_nfs_server: ""
# Separate override for the NFS server used for home directories.
# Falls back to samba_nfs_server, then to the DC.
samba_nfs_homes_server: ""

# --- Domain password policy ---
# NOTE: keep the value quoted ("off"/"on").  Unquoted off/on are YAML
# booleans and would render as False/True, which samba-tool rejects.
samba_password_complexity: "off"
# samba-tool domain passwordsettings caps min-pwd-length at 14
# (the underlying AD attribute is a uint8 with a hardcoded ceiling).
# Going higher requires editing the policy via LDAP directly.
samba_password_min_length: 14
samba_password_max_age: 42
samba_password_min_age: 1
samba_password_history: 24

# --- Account lockout policy ---
samba_account_lockout_threshold: 0
samba_account_lockout_duration: 30
samba_account_reset_lockout_after: 30

# --- Schema extensions ---
samba_enable_sudo_schema: true

# --- AD-stored autofs maps (consumed by SSSD's autofs service on clients) ---
# Seeds OU=automount with the base auto.master/auto.home/auto.shares maps and
# the auto.home wildcard.  Per-share entries are NOT seeded here -- they are
# added operationally by bin/samba-automount.sh add-share.  Idempotent;
# existing entries are preserved.
samba_enable_autofs_seed: true
# Client-side mount points that the master map will manage.  Must match
# sssd_autofs_shares_mount / sssd_mounted_homedir_base on the clients.
samba_autofs_shares_mount: "/data"
samba_autofs_homes_mount: "/home/ad"
# Autofs idle timeouts (seconds) carried in the auto.master nisMapEntry.
samba_autofs_shares_timeout: 300
samba_autofs_homes_timeout: 600

# --- Runtime file cleanup ---
samba_cleanup_runtime_files: true

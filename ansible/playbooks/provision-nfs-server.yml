# provision-nfs-server.yml - Provision a dedicated NFS storage server.
#
# Joins the host to the AD domain (sssd-client) then configures it as an
# NFSv4+Kerberos file server (nfs-server).  The host must be in the
# nfs_servers inventory group and inherit SSSD credentials from the
# domain_members parent group.
#
# The DC pre-play ensures /root/.ssh/id_ed25519 exists and slurps the
# public key so the nfs-server role can install it in the storage host's
# authorized_keys (used by samba-user.sh to manage AD home directories
# over SSH).
---
- name: Prepare DC for cross-host home directory management
  hosts: dc
  become: true
  tasks:
    - name: Ensure /root/.ssh exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Generate DC root SSH keypair (idempotent)
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N "" -f /root/.ssh/id_ed25519 -C "samba-dc home-dir mgmt"
        creates: /root/.ssh/id_ed25519

    - name: Read DC root SSH public key
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _samba_dc_root_pubkey

- name: Provision NFS storage server
  hosts: nfs_servers
  become: true
  # Storage hosts are the data source for shares (/data) and homes
  # (/home/ad); they must not run client-side autofs against the same
  # paths, or autofs shadows the local directories and breaks server-side
  # share/home directory creation.
  vars:
    sssd_configure_autofs: false
    sssd_enable_autofs: false
  roles:
    - sssd-client
    - nfs-server

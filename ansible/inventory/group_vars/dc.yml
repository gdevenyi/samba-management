# dc.yml - Group variables for the Samba AD Domain Controller hosts.
#
# These values override role defaults in roles/samba-dc/defaults/main.yml.
# SECURITY: samba_admin_password MUST be changed before running playbooks.
# Consider using Ansible Vault for production deployments.
---
# Kerberos realm (must be uppercase FQDN).
samba_realm: "EXAMPLE.INTERNAL"
# NetBIOS domain name (pre-Windows 2000 compatibility).
samba_domain: "EXAMPLE"
samba_netbios: "EXAMPLE"
# Initial Administrator password - CHANGE THIS before provisioning.
samba_admin_password: "CHANGE_ME_STRONG_PASSWORD"
# DNS forwarders for queries outside the AD zone (Samba INTERNAL_DNS backend).
# List multiple upstreams for resiliency; Samba tries them in order.
samba_dns_forwarders:
  - "8.8.8.8"
  - "8.8.4.4"
# TLS is disabled by default; enable only after deploying proper certificates.
samba_tls_enabled: false
#
# Shares are NOT declared here.  Create them operationally on the DC with:
#   samba-automount.sh add-share <name>            # dir + NFS export + autofs map
#   samba-automount.sh add-share <name> --fsid=101 # pin a stable fsid on ZFS/Btrfs
# See docs/SCENARIOS.md.  Access control is via POSIX permissions on the
# directory (chown/chmod on the NFS host).
#
# Stable NFS filesystem id for the /home/ad export (homes are still exported
# declaratively).  On ZFS/Btrfs set a unique small integer (not 0) to avoid
# client ESTALE across a reboot or pool export/import; keep it distinct from
# any per-share --fsid you assign.  Empty (default) lets the kernel derive it.
samba_nfs_homes_fsid: 100

# nfs_servers.yml - Group variables for dedicated NFS storage servers.
#
# Storage servers are domain members (SSSD join credentials inherited from
# domain_members.yml).  The role sets up the NFSv4/Kerberos server and the
# home-directory export; individual shares are created operationally from the
# DC with bin/samba-automount.sh add-share (which SSHes to this host to create
# the directory and export).  Nothing per-share is declared here.
#
# These values override role defaults in roles/nfs-server/defaults/main.yml.
---
# Whether to export samba_home_base (default /home/ad) via NFS for home directory mounts.
samba_nfs_export_homes: true
# Stable NFS filesystem id for the /home/ad export (see dc.yml).  Set a unique
# small integer (not 0) on ZFS/Btrfs; empty (default) lets the kernel derive it.
samba_nfs_homes_fsid: 100

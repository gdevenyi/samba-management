# sssd.yml - Install and configure SSSD on the DC itself.
#
# This exists because samba-ad-dc's internal winbind doesn't return AD
# secondary-group memberships through the kernel's NSS getgrouplist()
# path, which breaks NFS server-side POSIX access checks for files
# owned by AD groups.  SSSD's id_provider=ad reads the membership
# directly via LDAP and exposes it correctly.
---
- name: Install SSSD on the DC
  ansible.builtin.apt:
    name:
      - sssd-ad
      - sssd-tools
      - libnss-sss
      - libpam-sss
      - krb5-user
    state: present
    update_cache: false

# SSSD authenticates to LDAP via GSSAPI using the DC's machine-account
# keys.  Export them to /etc/krb5.keytab if they're not already there.
- name: Check if machine principal is in keytab
  ansible.builtin.command: klist -k /etc/krb5.keytab
  register: _samba_keytab_check
  changed_when: false
  failed_when: false

- name: Export machine principal to system keytab
  ansible.builtin.command:
    argv:
      - samba-tool
      - domain
      - exportkeytab
      - /etc/krb5.keytab
      - "--principal={{ ansible_hostname }}$"
  # Case-insensitive: klist may render the machine principal in the
  # account's stored case (DC01$@REALM) while ansible_hostname is lowercase,
  # which would make a case-sensitive check re-export on every run and
  # accumulate duplicate keytab entries.
  when: (ansible_hostname | upper) + '$@' not in (_samba_keytab_check.stdout | upper)
  changed_when: true

# SSSD's GSSAPI bind to LDAP fails on hosts whose reverse DNS points at a
# name other than their AD identity -- a DC may be reachable at a site name
# in externally-owned DNS while its AD name lives in the Samba zone.  With
# MIT Kerberos' default rdns=true, the krb5 layer reverse-resolves the LDAP
# server's IP to the site name and asks the KDC for ldap/<site-name>, which
# has no SPN -> "Server not found in Kerberos database" -> SSSD marks the
# domain offline and NSS returns nothing.  Disabling rdns makes Kerberos use
# the (forward) name SSSD actually connected to, which does carry an ldap/
# SPN.  Delivered as a krb5.conf.d drop-in rather than editing the Samba-
# generated /etc/krb5.conf in place.
- name: Ensure krb5.conf pulls in the drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/krb5.conf
    line: "includedir /etc/krb5.conf.d/"
    regexp: '^\s*includedir\s+/etc/krb5\.conf\.d/?\s*$'
    insertbefore: BOF
    mode: "0644"

- name: Deploy Kerberos behaviour drop-in for the DC
  ansible.builtin.copy:
    dest: /etc/krb5.conf.d/samba-dc.conf
    mode: "0644"
    owner: root
    group: root
    content: |
      # Managed by the samba-dc role -- do not edit.
      [libdefaults]
          rdns = false
  notify: Restart sssd

- name: Deploy SSSD configuration for the DC
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: "0600"
    owner: root
    group: root
  notify: Restart sssd

- name: Reload systemd so packaged sssd responder socket units are known
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start sssd
  ansible.builtin.systemd:
    name: sssd
    enabled: true
    state: started

- name: Flush handlers so SSSD picks up the new config before NSS uses it
  ansible.builtin.meta: flush_handlers

# The sssd package enables responder sockets at install time; before this
# template (no `services` line) is in place they can trip
# sssd_check_socket_activated_responders and be left "failed".  Clear that
# residual so the next activation (and the socket-activation test) is clean.
- name: Reset any failed SSSD responder sockets from the install window
  ansible.builtin.command: systemctl reset-failed 'sssd-*.socket' # noqa: command-instead-of-module
  changed_when: false
  failed_when: false

# Socket activation: enable the two responders the DC needs (see the
# sssd.conf.j2 note).  `state: started` also recovers a unit from a prior
# failed state.  The others are left to their package default.
- name: Enable SSSD nss and pam responder sockets (socket activation)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - sssd-nss.socket
    - sssd-pam.socket

# Deploy the SSSD-using nsswitch.conf NOW, before the resolution-warmup
# checks below.  Otherwise libnss-winbind (pulled in by samba-ad-dc as a
# dependency and auto-registered into nsswitch.conf at install time) would
# answer NSS queries with bogus `SAMBA\<name>:x:100` entries from its tdb,
# masking SSSD's correct answers.
- name: Configure nsswitch to use SSSD
  ansible.builtin.template:
    src: nsswitch.conf.j2
    dest: /etc/nsswitch.conf
    owner: root
    group: root
    mode: "0644"
    backup: true

# Wait until SSSD can resolve domain users AND groups via NSS.  Both must
# warm up before downstream tasks chown to AD group names.  Checking only
# user resolution is not enough -- group lookups have a separate cache and
# may still return ENOENT (causing the file module to silently fall back to
# the local `users` group with GID 100).
- name: Verify SSSD resolves a domain user
  ansible.builtin.command: getent passwd Administrator
  register: _sssd_user_resolve
  changed_when: false
  retries: 5
  delay: 3
  until: _sssd_user_resolve.rc == 0

- name: Verify SSSD resolves the 'domain users' group
  ansible.builtin.command:
    cmd: getent group "domain users"
  register: _sssd_group_resolve
  changed_when: false
  retries: 10
  delay: 3
  until:
    - _sssd_group_resolve.rc == 0
    # Reject the local `users` group (GID 100) -- we want the AD-mapped one.
    - "'domain users:' in _sssd_group_resolve.stdout"
    - "_sssd_group_resolve.stdout.split(':')[2] | int != 100"

# Re-apply ownership on share directories now that SSSD can resolve AD
# group names.  configure.yml creates these directories before SSSD is up,
# at which point "domain users" only resolves to the local `users` group
# (GID 100).  Without this fix-up, AD users can't read/write the shares.
- name: Re-apply share base ownership with resolved AD group
  ansible.builtin.file:
    path: "{{ samba_share_base }}"
    state: directory
    mode: "0755"
    owner: root
    group: "domain users"
  when: samba_nfs_server == ""

# The NFS server caches uid->gid mappings.  Force a flush so authentication
# checks use the new AD-resolved GIDs rather than the stale numeric values.
- name: Flush kernel NFS auth caches after group resolution change
  ansible.builtin.shell: |
    set -e
    for f in /proc/net/rpc/auth.unix.gid /proc/net/rpc/nfs4.nametoid /proc/net/rpc/nfs4.idtoname; do
      [ -e "$f/flush" ] && date +%s > "$f/flush"
    done
  changed_when: false
  when: samba_nfs_server == ""

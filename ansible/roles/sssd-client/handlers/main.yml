# sssd-client handlers - Client-specific service handlers.
#
# Cross-role handlers (Reload systemd, Restart sssd, NFS service handlers)
# live in the common role's handlers/main.yml and are loaded via the
# meta/main.yml dependency.
---
# Autofs must be restarted when map files or sssd.conf services change so
# it re-reads them.
- name: Restart autofs
  ansible.builtin.systemd:
    name: autofs
    state: restarted

- name: Restart sshd
  ansible.builtin.systemd:
    name: ssh
    state: restarted

# Pick up changes under /etc/systemd/resolved.conf.d/ without rebooting.
# `restart` is the only way to make resolved re-parse drop-ins; reload
# is a no-op for resolved.
- name: Reload systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted

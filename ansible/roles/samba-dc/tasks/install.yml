# Install packages and manage services.
---
- name: Install samba-ad-dc packages
  ansible.builtin.apt:
    name: "{{ samba_dc_packages }}"
    state: present
    update_cache: true

# Installed here (before configure.yml switches the resolver to the local
# Samba DNS) so any dependency downloads use the image's original working
# resolver.  sssd.yml re-declares these as a harmless idempotent no-op.
- name: Install DC-side SSSD packages while external DNS still resolves
  ansible.builtin.apt:
    name: "{{ samba_dc_sssd_packages }}"
    state: present
    update_cache: false

- name: Disable and mask standard Samba services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  loop: "{{ samba_dc_mask_services }}"
  failed_when: false

- name: Unmask and enable samba-ad-dc service
  ansible.builtin.systemd:
    name: "{{ samba_dc_service }}"
    masked: false
    enabled: true

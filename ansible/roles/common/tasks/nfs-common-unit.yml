# nfs-common-unit.yml - Ubuntu NFS-client baseline shared by every NFS host.
#
# Ubuntu (24.04 and later) ships /usr/lib/systemd/system/nfs-common.service as
# a symlink to /dev/null (a package-level mask), so `systemctl start
# nfs-common` is a no-op.  Replace it with a real oneshot unit so dependent
# services (rpc-gssd, autofs) actually have something to pull in.
#
# Also enables NEED_GSSD=yes for Kerberos NFS, and starts rpc-gssd which
# every consumer (DC, storage host, client) needs.  Roles that need
# additional NFS services (nfs-common, nfs-idmapd, nfs-server, rpc-svcgssd)
# start those themselves after including this file.
---
- name: Enable GSSD for Kerberos NFS
  ansible.builtin.lineinfile:
    path: /etc/default/nfs-common
    regexp: "^NEED_GSSD="
    line: "NEED_GSSD=yes"
    create: true
    mode: "0644"

# state: absent is a harmless no-op on releases that don't ship the mask, so
# this covers 24.04, 26.04, and any future Ubuntu without a per-version gate.
- name: Remove package-level mask symlink for nfs-common (Ubuntu)
  ansible.builtin.file:
    path: /usr/lib/systemd/system/nfs-common.service
    state: absent
  when: ansible_facts['distribution'] == "Ubuntu"

- name: Create real nfs-common service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/nfs-common.service
    mode: "0644"
    content: |
      [Unit]
      Description=NFS Common daemons and services
      DefaultDependencies=no
      After=local-fs.target network.target
      Wants=nfs-client.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/true

      [Install]
      WantedBy=multi-user.target
  notify: Reload systemd

- name: Flush handlers so daemon-reload runs before we start the unit
  ansible.builtin.meta: flush_handlers

# rpc.gssd opens the pipefs-directory from /etc/nfs.conf (/run/rpc_pipefs on
# current nfs-utils).  On Ubuntu 22.04 that mount (run-rpc_pipefs.mount, from
# the rpc-pipefs-generator) is left inactive at boot while the legacy
# /var/lib/nfs/rpc_pipefs is mounted instead, and rpc_pipefs.target reports
# active without it -- so rpc-gssd aborts with "opendir(/run/rpc_pipefs)
# failed".  Start the mount unit directly; a no-op where it's already mounted
# (24.04/26.04/Debian 12), tolerant on any layout that lacks the unit.
- name: Ensure the RPC pipefs mount is active before rpc-gssd
  ansible.builtin.systemd:
    name: run-rpc_pipefs.mount
    state: started
  failed_when: false

- name: Enable and start rpc-gssd (Kerberos NFS)
  ansible.builtin.systemd:
    name: rpc-gssd
    enabled: true
    state: started

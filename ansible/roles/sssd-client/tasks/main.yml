# sssd-client tasks - Main task list for joining a Linux client to the AD domain.
#
# Installs SSSD + dependencies, joins via realmd, deploys sssd.conf,
# configures PAM for home directory creation, and sets up autofs for
# NFSv4 share and home directory auto-mounting.
---
# --- Pre-flight validation ---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - sssd_realm | length > 0
      - sssd_domain | length > 0
      - sssd_admin_password | length > 0
      - sssd_homedir_mode in ['local', 'mounted']
    fail_msg: "sssd_realm, sssd_domain, sssd_admin_password are required. sssd_homedir_mode must be 'local' or 'mounted'"

# --- Package installation ---
# sssd-ad:    SSSD Active Directory provider
# realmd:     High-level domain join tool (wraps adcli/sssd)
# adcli:      Low-level AD join tool (creates computer object)
# libnss-sss/libpam-sss: NSS and PAM modules for identity resolution
# autofs/nfs-common: on-demand NFSv4 mounting with Kerberos auth
- name: Install SSSD and dependencies
  ansible.builtin.apt:
    name:
      - sssd-ad
      - sssd-tools
      - realmd
      - adcli
      - krb5-user
      - samba-common-bin
      - libnss-sss
      - libpam-sss
      - autofs
      - nfs-common
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

# --- Configure DNS to point to the DC ---
- name: Set DNS server to DC for domain resolution
  ansible.builtin.shell: >-
    resolvectl dns {{ ansible_facts['default_ipv4']['interface'] }} {{ sssd_dc_ip | default(groups['dc'][0]) }}
    && resolvectl domain {{ ansible_facts['default_ipv4']['interface'] }} {{ sssd_domain }}
  args:
    executable: /bin/bash
  changed_when: true

# --- Domain discovery and join ---
- name: Discover AD domain
  ansible.builtin.command: "realm discover {{ sssd_domain }}"
  register: realm_discover
  changed_when: false

- name: Check if already joined
  ansible.builtin.command: "realm list"
  register: realm_list
  changed_when: false

# realm join creates the computer object in AD and configures SSSD.
# The expect module provides the password non-interactively.
# no_log: true prevents the password from appearing in Ansible output.
- name: Join the AD domain
  ansible.builtin.shell: >-
    set -o pipefail;
    echo '{{ sssd_admin_password }}' | realm join -v -U {{ sssd_admin_user }} {{ sssd_domain }}
  args:
    executable: /bin/bash
  when: sssd_domain not in realm_list.stdout
  changed_when: true
  no_log: true

# --- Home directory mode selection ---
# Set the effective fallback_homedir based on whether homes are created
# locally (pam_mkhomedir) or auto-mounted via NFS from the DC.
- name: Set fallback_homedir for mounted mode
  ansible.builtin.set_fact:
    sssd_effective_fallback_homedir: "{{ sssd_mounted_homedir_base }}/%u"
  when: sssd_homedir_mode == 'mounted'

- name: Set fallback_homedir for local mode
  ansible.builtin.set_fact:
    sssd_effective_fallback_homedir: "{{ sssd_fallback_homedir }}"
  when: sssd_homedir_mode == 'local'

# --- SSSD configuration ---
# Deploy our template over the one generated by realm join, because
# realm's defaults don't include our custom homedir and autofs settings.
# Mode 0600 is mandatory: SSSD refuses to start if sssd.conf is readable
# by anyone other than root (it may contain cached credentials).
- name: Deploy sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: "0600"
    owner: root
    group: root
  notify: Restart sssd

# pam_mkhomedir automatically creates a local home directory skeleton
# on first login.  Only enable for local mode; in mounted mode the home
# dir comes from the DC via NFS.
- name: Enable pam_mkhomedir (local homedirs only)
  ansible.builtin.command: pam-auth-update --enable mkhomedir
  when: sssd_homedir_mode == 'local'
  changed_when: false

- name: Disable pam_mkhomedir (mounted homedirs)
  ansible.builtin.command: pam-auth-update --disable mkhomedir
  when: sssd_homedir_mode == 'mounted'
  changed_when: false

# --- idmapd configuration ---
# Required for NFSv4 UID/GID name mapping.  The domain must match the
# DC's idmapd.conf for consistent identity translation.
- name: Deploy idmapd.conf
  ansible.builtin.template:
    src: idmapd.conf.j2
    dest: /etc/idmapd.conf
    mode: "0644"
  notify: Restart autofs

- name: Enable GSSD for Kerberos NFS
  ansible.builtin.lineinfile:
    path: /etc/default/nfs-common
    regexp: "^NEED_GSSD="
    line: "NEED_GSSD=yes"
    create: true
    mode: "0644"

- name: Remove package-level mask symlink for nfs-common (Ubuntu 24.04)
  ansible.builtin.file:
    path: /usr/lib/systemd/system/nfs-common.service
    state: absent
  when: >-
    ansible_facts['distribution'] == "Ubuntu" and
    ansible_facts['distribution_major_version'] == "24"

- name: Create real nfs-common service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/nfs-common.service
    mode: "0644"
    content: |
      [Unit]
      Description=NFS Common daemons and services
      DefaultDependencies=no
      After=local-fs.target network.target
      Wants=nfs-client.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/true

      [Install]
      WantedBy=multi-user.target
  register: _nfs_common_unit

- name: Reload systemd after unit change
  ansible.builtin.systemd:
    daemon_reload: true
  when: _nfs_common_unit.changed

- name: Enable and start rpc-gssd (Kerberos NFS)
  ansible.builtin.systemd:
    name: rpc-gssd
    enabled: true
    state: started

# --- Autofs configuration ---
# Sets up on-demand NFSv4 mounting for network shares and (optionally)
# home directories.  The autofs timeout determines how long shares stay
# mounted after last access.
- name: Configure autofs
  when: sssd_configure_autofs
  block:
    - name: Create autofs master directory
      ansible.builtin.file:
        path: /etc/auto.master.d
        state: directory
        mode: "0755"

    # Master map entry: tells autofs to watch sssd_autofs_base and use
    # /etc/auto.shares as the map, with a 300-second idle timeout.
    - name: Deploy autofs master map for network shares
      ansible.builtin.copy:
        content: "{{ sssd_autofs_base }} /etc/auto.shares --timeout=300\n"
        dest: /etc/auto.master.d/shares.autofs
        mode: "0644"
      notify: Restart autofs

    # The shares map: one line per share with NFSv4 mount options.
    - name: Deploy autofs shares map
      ansible.builtin.copy:
        content: |
          {% for share in sssd_shares %}
          {{ share }} -fstype=nfs4,sec={{ sssd_nfs_sec }} {{ sssd_dc_hostname }}.{{ sssd_domain }}:/data/{{ share }}
          {% endfor %}
        dest: /etc/auto.shares
        mode: "0644"
      notify: Restart autofs

    - name: Create autofs mount base
      ansible.builtin.file:
        path: "{{ sssd_autofs_base }}"
        state: directory
        mode: "0755"

    # Home directory autofs: uses a wildcard map so any user accessing
    # /home/ad/<username> triggers an NFS mount of their DC home dir.
    - name: Configure autofs home directory mounts
      when: sssd_homedir_mode == 'mounted'
      block:
        - name: Create mounted home base directory
          ansible.builtin.file:
            path: "{{ sssd_mounted_homedir_base }}"
            state: directory
            mode: "0755"

        # 600-second timeout for home dirs (longer than shares because
        # users are more sensitive to home directory latency).
        - name: Deploy autofs home master map
          ansible.builtin.copy:
            content: "{{ sssd_mounted_homedir_base }} /etc/auto.home --timeout=600\n"
            dest: /etc/auto.master.d/home.autofs
            mode: "0644"
          notify: Restart autofs

        # The wildcard (*) map key matches any subdirectory name.  The
        # ampersand (&) in the NFS path is replaced by the matched key,
        # so accessing /home/ad/jsmith mounts dc01:/home/jsmith.
        - name: Deploy autofs home map (wildcard NFS mount)
          ansible.builtin.copy:
            content: "* -fstype=nfs4,sec={{ sssd_nfs_sec }} {{ sssd_dc_hostname }}.{{ sssd_domain }}:/home/&\n"
            dest: /etc/auto.home
            mode: "0644"
          notify: Restart autofs

    - name: Enable and start autofs
      ansible.builtin.systemd:
        name: autofs
        enabled: true
        state: started

# --- Start SSSD ---
- name: Enable and start sssd
  ansible.builtin.systemd:
    name: sssd
    enabled: true
    state: started

- name: Flush handlers (restart SSSD if config changed)
  ansible.builtin.meta: flush_handlers

# --- SSH key retrieval from AD ---
- name: Configure sshd for SSSD key lookup
  when: sssd_enable_ssh | bool
  block:
    - name: Deploy sshd_config AuthorizedKeysCommand snippet
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/sssd.conf
        mode: "0644"
        content: |
          AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys
          AuthorizedKeysCommandUser root
      notify: Restart sshd

# --- Verification ---
# Retry getent a few times because SSSD may need a moment to initialise
# its connection to the DC after first startup.
- name: Verify domain user lookup (getent)
  ansible.builtin.command: "getent passwd {{ sssd_admin_user }}"
  register: getent_check
  changed_when: false
  retries: 5
  delay: 3
  until: getent_check.rc == 0

- name: Verify domain group lookup
  ansible.builtin.command: "getent group 'domain users'"
  register: getent_group
  changed_when: false
  retries: 3
  delay: 2
  until: getent_group.rc == 0

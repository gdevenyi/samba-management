# Configure NSS and PAM so the DC resolves its own AD users locally.
# Winbind is used on the DC (not SSSD) because samba-ad-dc provides
# winbind functionality natively.
---
- name: Install winbind and libnss-winbind
  ansible.builtin.apt:
    name:
      - winbind
      - libnss-winbind
      - libpam-winbind
    state: present

- name: Configure nsswitch to use winbind
  ansible.builtin.template:
    src: nsswitch.conf.j2
    dest: /etc/nsswitch.conf
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure pam_mkhomedir for automatic home creation
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional        pam_mkhomedir.so skel=/etc/skel umask=0022"
    regexp: '^session\s+.*pam_mkhomedir\.so'
    insertafter: '^session\s+required\s+pam_unix\.so'
    state: present
    backup: true

# Pre-flight assertions: validate OS, hostname, and required variables.
---
- name: Validate supported operating system
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Ubuntu', 'Debian']
      - >-
        (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] in ['22.04', '24.04', '26.04']) or
        (ansible_facts['distribution'] == 'Debian' and ansible_facts['distribution_major_version'] == '12')
    fail_msg: >-
      Only Ubuntu 22.04/24.04/26.04 and Debian 12 are supported. Current: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
    success_msg: "OS {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }} is supported"

- name: Validate hostname length and reserved names
  ansible.builtin.assert:
    that:
      - ansible_facts['hostname'] | length <= 15
      - ansible_facts['hostname'] | lower not in ['pdc', 'bdc']
    fail_msg: "Hostname must be <= 15 chars and not use NT4 reserved names (PDC, BDC)"

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - samba_realm is defined and samba_realm | length > 0
      - samba_domain is defined and samba_domain | length > 0
      - samba_admin_password is defined and samba_admin_password | length > 0
    fail_msg: "samba_realm, samba_domain, and samba_admin_password are required"

- name: Check /etc/hosts resolves FQDN to LAN IP
  ansible.builtin.command: "getent hosts {{ ansible_facts['fqdn'] }}"
  register: hosts_check
  changed_when: false
  failed_when: "'127.0.0.1' in hosts_check.stdout"

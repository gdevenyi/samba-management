# nfs.yml - Configure NFSv4 server for Kerberos-authenticated exports.
#
# Sets up the NFS kernel server with sec=krb5p, deploys per-share
# export files under /etc/exports.d/, and provisions idmapd.conf
# for consistent UID/GID mapping across server and clients.
---
# samba-tool returns non-zero (and prints "already exists") when the SPN is
# already on the object -- tolerate exactly that case instead of a blanket
# failed_when: false that would also swallow genuine failures.
- name: Add NFS service principal to DC machine account
  ansible.builtin.command: >-
    samba-tool spn add nfs/{{ ansible_facts['fqdn'] }} {{ ansible_facts['hostname'] }}$
  register: _dc_spn_add
  failed_when:
    - _dc_spn_add.rc != 0
    - "'already' not in (_dc_spn_add.stderr | default(''))"
  changed_when: _dc_spn_add.rc == 0

- name: Check if NFS principal exists in keytab
  ansible.builtin.command: klist -k /etc/krb5.keytab
  register: _keytab_check
  changed_when: false
  failed_when: false

- name: Export NFS principal to system keytab
  ansible.builtin.command:
    argv:
      - samba-tool
      - domain
      - exportkeytab
      - /etc/krb5.keytab
      - "--principal=nfs/{{ ansible_facts['fqdn'] }}"
  # Case-insensitive to match however klist renders the principal.
  when: >-
    _keytab_check.rc != 0 or
    ('nfs/' + ansible_facts['fqdn']) | upper not in _keytab_check.stdout | upper
  changed_when: true

# /etc/exports.d holds the homes export (below) and per-share export files
# deployed operationally by bin/samba-automount.sh add-share.
- name: Create /etc/exports.d directory
  ansible.builtin.file:
    path: /etc/exports.d
    state: directory
    mode: "0755"

- name: Ensure home base directory exists
  ansible.builtin.file:
    path: "{{ samba_home_base }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: samba_nfs_export_homes | bool

- name: Deploy NFS home directories export
  ansible.builtin.template:
    src: "{{ role_path }}/../common/templates/homes.exports.j2"
    dest: /etc/exports.d/homes.exports
    mode: "0644"
  when: samba_nfs_export_homes | bool
  notify: Reload NFS exports

- name: Deploy idmapd.conf
  ansible.builtin.template:
    src: "{{ role_path }}/../common/templates/idmapd.conf.j2"
    dest: /etc/idmapd.conf
    mode: "0644"
  vars:
    samba_idmap_domain: "{{ samba_realm | lower }}"
  notify:
    - Restart nfs-idmapd
    - Restart rpc-gssd

# When users authenticate via Kerberos NFS, the kernel needs to know each
# user's full group list to enforce POSIX permissions correctly.  With
# --manage-gids the NFS server queries getgrouplist() locally rather than
# trusting the (limited, possibly stale) GID list the client sends.
# The /etc/nfs.conf [mountd] manage-gids key is read by rpc.mountd but the
# packaged systemd unit on Ubuntu 24.04 ignores it, so we force the flag via
# a drop-in.
- name: Ensure nfs-mountd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/nfs-mountd.service.d
    state: directory
    mode: "0755"

- name: Enable manage-gids on rpc.mountd
  ansible.builtin.copy:
    dest: /etc/systemd/system/nfs-mountd.service.d/manage-gids.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/sbin/rpc.mountd --manage-gids
  notify:
    - Reload systemd
    - Restart nfs-mountd

- name: Set up shared NFS-common baseline (NEED_GSSD, unit workaround, rpc-gssd)
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/nfs-common-unit.yml"

- name: Enable and start nfs-common
  ansible.builtin.systemd:
    name: nfs-common
    enabled: true
    state: started

- name: Enable and start nfs-idmapd
  ansible.builtin.systemd:
    name: nfs-idmapd
    enabled: true
    state: started

- name: Enable and start NFS server
  ansible.builtin.systemd:
    name: nfs-server
    enabled: true
    state: started

- name: Enable and start rpc-svcgssd (server-side Kerberos NFS)
  ansible.builtin.systemd:
    name: rpc-svcgssd
    enabled: true
    state: started

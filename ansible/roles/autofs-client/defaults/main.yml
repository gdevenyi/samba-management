# autofs-client defaults - Default variables for the standalone autofs-client role.
#
# This role is a lighter alternative to the autofs configuration embedded
# in sssd-client; use it when you only need share mounting without
# re-running the full SSSD provisioning.
---
# Base directory where shares are auto-mounted on access.
autofs_base: "/mnt/shares"
# DC hostname for CIFS mount targets.
autofs_dc_hostname: "dc01"
# AD DNS domain (lowercase).
autofs_domain: "example.internal"
# List of share names to include in the autofs map.
autofs_shares: []
# Idle timeout in seconds before autofs unmounts an unused share.
autofs_timeout: 300

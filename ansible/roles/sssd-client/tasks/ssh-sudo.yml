# ssh-sudo.yml - SSH AuthorizedKeysCommand and sudoers NSS routing.
---
- name: Configure sshd for SSSD key lookup
  when: sssd_enable_ssh | bool
  block:
    - name: Deploy sshd_config AuthorizedKeysCommand snippet
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/sssd.conf
        mode: "0644"
        # sss_ssh_authorizedkeys talks to the SSSD socket; the privileged
        # work happens inside SSSD itself, so we don't need to run the
        # helper as root.  nobody matches upstream packaging guidance and
        # cuts the privilege of code launched from sshd's parent context.
        content: |
          AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys
          AuthorizedKeysCommandUser nobody
      notify: Restart sshd

- name: Configure sudo via SSSD
  when: sssd_enable_sudo | bool
  block:
    - name: Configure nsswitch.conf for SSSD sudo
      ansible.builtin.lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^sudoers:'
        line: "sudoers: files sss"
        create: true
        mode: "0644"

# Client helper scripts from client/linux/.
- name: Deploy domain healthcheck script
  ansible.builtin.copy:
    src: "{{ role_path }}/../../../client/linux/healthcheck.sh"
    dest: /usr/local/sbin/domain-healthcheck.sh
    mode: "0755"
    owner: root
    group: root
  when: sssd_deploy_client_scripts | bool

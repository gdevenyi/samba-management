# hosts.yml - Ansible inventory defining the host groups in the Samba AD domain.
#
#   dc:              Samba AD domain controllers
#   nfs_servers:     Dedicated NFS storage servers (domain-joined)
#   linux_clients:   Linux workstations/servers to join via SSSD
#   windows_clients: Windows workstations to join via microsoft.ad.membership
#
# nfs_servers and linux_clients are children of domain_members so they share
# SSSD join credentials (realm, admin password, etc.) from group_vars.
all:
  children:
    dc:
      hosts:
        dc01.example.internal:
    domain_members:
      children:
        nfs_servers:
          hosts: {}
        linux_clients:
          hosts: {}
    windows_clients:
      hosts: {}

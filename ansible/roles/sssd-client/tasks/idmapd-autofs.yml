# idmapd-autofs.yml - NFSv4 ID mapping and SSSD-brokered autofs maps.
---
# idmapd's Domain= must match the DC's idmapd.conf for consistent NFSv4
# UID/GID name mapping.
- name: Deploy idmapd.conf
  ansible.builtin.template:
    src: "{{ role_path }}/../common/templates/idmapd.conf.j2"
    dest: /etc/idmapd.conf
    mode: "0644"
  vars:
    samba_idmap_domain: "{{ sssd_domain }}"
  notify: Restart autofs

- name: Set up shared NFS-common baseline (NEED_GSSD, unit workaround, rpc-gssd)
  ansible.builtin.include_tasks: "{{ role_path }}/../common/tasks/nfs-common-unit.yml"

# Kerberos client behaviour for this stack, delivered as a krb5.conf.d drop-in
# (the stock /etc/krb5.conf already carries `includedir /etc/krb5.conf.d/`).
#   - rdns=false / dns_canonicalize_hostname=false: don't let krb5 rewrite the
#     server name when acquiring service tickets -- the AD servers are reached
#     by site FQDNs whose forward/reverse DNS doesn't match their SPNs.
#   - [domain_realm] (from sssd_krb5_realm_map): pin those site FQDNs to the AD
#     realm.  Without it krb5 guesses the realm from the DNS domain (e.g.
#     UTORONTO.CA for a *.utoronto.ca host) and rpc.gssd/LDAP request
#     <svc>/<host>@<wrong-realm> -> "Server not found in Kerberos database", so
#     NFSv4 sec=krb5p mounts (and any GSSAPI to those hosts) fail even though
#     user lookups work.  See AGENTS.md > "krb5 realm mapping for site-named
#     servers".
- name: Ensure krb5.conf pulls in the drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/krb5.conf
    line: "includedir /etc/krb5.conf.d/"
    regexp: '^\s*includedir\s+/etc/krb5\.conf\.d/?\s*$'
    insertbefore: BOF
    mode: "0644"

- name: Deploy Kerberos behaviour drop-in for the client
  ansible.builtin.template:
    src: krb5-samba-ad.conf.j2
    dest: /etc/krb5.conf.d/samba-ad.conf
    mode: "0644"
    owner: root
    group: root
  notify: Restart rpc-gssd

# Migration: earlier versions edited /etc/krb5.conf in place with a marked
# block; remove it so the drop-in is the single source of truth.
- name: Remove the legacy in-place [domain_realm] block from krb5.conf
  ansible.builtin.blockinfile:
    path: /etc/krb5.conf
    marker: "# {mark} ANSIBLE MANAGED [domain_realm] (sssd-client)"
    state: absent

# Maps are stored in AD under OU=automount and consumed by SSSD's autofs
# service; no per-client map files are written.  We only set up the
# mount-base directories, the NSS routing, and start the service.
- name: Configure autofs
  when: sssd_configure_autofs
  block:
    - name: Create autofs mount base for shares
      ansible.builtin.file:
        path: "{{ sssd_autofs_base }}"
        state: directory
        mode: "0755"

    - name: Create autofs mount base for home directories
      ansible.builtin.file:
        path: "{{ sssd_mounted_homedir_base }}"
        state: directory
        mode: "0755"
      when: sssd_homedir_mode == 'mounted'

    # NSS routing: with sssd_enable_autofs on, look up maps via SSSD first
    # (it brokers the AD-stored maps); 'files' kept as fallback so any
    # locally dropped /etc/auto.* still resolves.
    - name: Configure nsswitch.conf for SSSD autofs
      ansible.builtin.lineinfile:
        path: /etc/nsswitch.conf
        regexp: '^automount:'
        line: "automount: {{ 'sss files' if sssd_enable_autofs | bool else 'files' }}"
        create: true
        mode: "0644"
      notify: Restart autofs

# hosts.yml - Ansible inventory defining the three host groups in the
# Samba AD domain.  Add hostnames/IPs to the appropriate groups:
#
#   dc:              Samba AD domain controllers
#   linux_clients:   Linux workstations/servers to join via SSSD
#   windows_clients: Windows workstations to join via win_domain_membership
all:
  children:
    dc:
      hosts:
        dc01.example.internal:
    # Add Linux client hostnames here, e.g.:
    #   workstation01.example.internal:
    linux_clients:
      hosts: {}
    # Add Windows client hostnames here (WinRM connectivity required).
    windows_clients:
      hosts: {}

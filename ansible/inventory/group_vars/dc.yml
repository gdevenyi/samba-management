# dc.yml - Group variables for the Samba AD Domain Controller hosts.
#
# These values override role defaults in roles/samba-dc/defaults/main.yml.
# SECURITY: samba_admin_password MUST be changed before running playbooks.
# Consider using Ansible Vault for production deployments.
---
# Kerberos realm (must be uppercase FQDN).
samba_realm: "EXAMPLE.INTERNAL"
# NetBIOS domain name (pre-Windows 2000 compatibility).
samba_domain: "EXAMPLE"
samba_netbios: "EXAMPLE"
# Initial Administrator password - CHANGE THIS before provisioning.
samba_admin_password: "CHANGE_ME_STRONG_PASSWORD"
# DNS forwarder for queries outside the AD zone (Samba INTERNAL_DNS backend).
samba_dns_forwarder: "8.8.8.8"
# TLS is disabled by default; enable only after deploying proper certificates.
samba_tls_enabled: false
# List of shares to provision on the DC.  Each entry creates the directory
# under /data and an NFS export file in /etc/exports.d/<name>.exports.
# Access control is managed via POSIX permissions on the directory.
samba_shares:
  - name: public
    comment: "Public share for all domain users"
  - name: finance
    comment: "Finance department share"

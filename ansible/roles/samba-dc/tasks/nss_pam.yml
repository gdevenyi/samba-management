# Configure PAM session hooks for the DC.
# NSS configuration (nsswitch.conf) is handled in sssd.yml so it lands
# before SSSD's group cache is queried by downstream tasks.
---
- name: Configure pam_mkhomedir for automatic home creation
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional        pam_mkhomedir.so skel=/etc/skel umask=0022"
    regexp: '^session\s+.*pam_mkhomedir\.so'
    insertafter: '^session\s+required\s+pam_unix\.so'
    state: present
    backup: true

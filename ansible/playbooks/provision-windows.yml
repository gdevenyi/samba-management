# provision-windows.yml - Ansible playbook to join Windows clients to the AD domain.
#
# Configures DNS to point to the Samba DC, joins the domain using
# microsoft.ad.membership, and lets the module handle the post-join reboot.
# Requires WinRM connectivity, the ansible.windows collection (for
# win_dns_client) and the microsoft.ad collection (for membership).
---
- name: Provision Windows client in AD domain
  hosts: windows_clients
  gather_facts: true
  tasks:
    # Point the Windows DNS resolver at the Samba DC so the client can
    # locate AD domain services via SRV records.
    - name: Set DNS to domain controller
      ansible.windows.win_dns_client:
        adapter_names: "*"
        dns_servers:
          - "{{ windows_dc_ip }}"

    # Join the domain.  microsoft.ad.membership replaces
    # ansible.windows.win_domain_membership (removed in ansible.windows
    # v3.0).  reboot: true tells the module to handle the post-join reboot
    # itself, which Windows requires for the join to take effect; no
    # separate win_reboot task needed.
    - name: Join the domain
      microsoft.ad.membership:
        dns_domain_name: "{{ windows_domain }}"
        domain_admin_user: "{{ windows_admin_user }}"
        domain_admin_password: "{{ windows_admin_password }}"
        state: domain
        reboot: true

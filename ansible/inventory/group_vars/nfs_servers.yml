# nfs_servers.yml - Group variables for dedicated NFS storage servers.
#
# Storage servers are domain members (SSSD join credentials inherited from
# domain_members.yml).  This file defines what shares and home directories
# the storage server exports via NFSv4/Kerberos.
#
# These values override role defaults in roles/nfs-server/defaults/main.yml.
---
# Shares to provision on this storage server.  Each entry creates the
# directory under nfs_server_share_base and an NFS export file in
# /etc/exports.d/<name>.exports.  Access control is via POSIX permissions.
# Uncomment and customize for your deployment:
# nfs_server_shares:
#   - name: public
#     comment: "Public share for all domain users"
#   - name: engineering
#     comment: "Engineering department share"

# Whether to export /home via NFS for home directory mounts.
nfs_server_export_homes: true

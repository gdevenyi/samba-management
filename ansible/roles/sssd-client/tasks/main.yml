# sssd-client tasks - Join a Linux host to the AD domain.
#
# Installs SSSD + dependencies, joins via realmd, deploys sssd.conf,
# configures PAM for home directory creation, sets up idmapd + autofs for
# NFSv4 share/home mounts, configures SSH and sudo via SSSD, then verifies.
#
# Each step lives in a focused subtask file (assertions, install, join,
# configure, idmapd-autofs, ssh-sudo, services, verify).
---
- name: Pre-flight assertions
  ansible.builtin.import_tasks: assertions.yml

- name: Install packages and configure DNS
  ansible.builtin.import_tasks: install.yml

- name: Discover and join the AD domain
  ansible.builtin.import_tasks: join.yml

- name: Register this host's A/PTR in Samba DNS (delegated to the DC)
  ansible.builtin.import_tasks: dns-register.yml
  when: sssd_register_dns | bool

- name: Bootstrap login anchor group on the DC
  ansible.builtin.import_tasks: dc-bootstrap.yml
  when:
    - sssd_login_anchor_group | length > 0
    - sssd_login_anchor_bootstrap | bool

- name: Configure SSSD and PAM
  ansible.builtin.import_tasks: configure.yml

- name: Configure idmapd, NFS-common, and autofs
  ansible.builtin.import_tasks: idmapd-autofs.yml

- name: Configure SSH key retrieval and sudo via SSSD
  ansible.builtin.import_tasks: ssh-sudo.yml

- name: Start SSSD and autofs services
  ansible.builtin.import_tasks: services.yml

- name: Verify SSSD identity resolution
  ansible.builtin.import_tasks: verify.yml

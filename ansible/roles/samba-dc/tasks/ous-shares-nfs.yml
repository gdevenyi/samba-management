# ous-shares-nfs.yml - AD organizational units, share directories, NFS.
#
# OU creation is first-run only.  Share directories only get created here
# in colocated NFS mode (samba_nfs_server == "") -- when NFS is offloaded
# to a dedicated host the nfs-server role owns those directories.  The
# cross-host SSH keypair likewise only matters when samba-user.sh has to
# manage /home over SSH.
---
- name: Create organizational units
  ansible.builtin.command: >-
    samba-tool ou create OU={{ item }}
    --description="Organizational Unit for {{ item }}"
  loop: "{{ samba_ous }}"
  when: _samba_just_provisioned | default(false)
  failed_when: false
  changed_when: true

- name: Create share base directory
  ansible.builtin.file:
    path: "{{ samba_share_base }}"
    state: directory
    mode: "0755"
    owner: root
    group: "domain users"
  when: samba_nfs_server == ""

- name: Create share directories
  ansible.builtin.file:
    path: "{{ item.path | default(samba_share_base ~ '/' ~ item.name) }}"
    state: directory
    mode: "0770"
    owner: root
    group: "domain users"
  loop: "{{ samba_shares }}"
  when: samba_nfs_server == ""

- name: Configure NFS server (DC-local)
  ansible.builtin.include_tasks: nfs.yml
  when: samba_nfs_server == ""

# When the NFS homes server is a separate host, samba-user.sh has to
# manage /home on that host over SSH.  Generate a passwordless root
# keypair on the DC; the nfs-server role copies the public half into the
# storage host's authorized_keys at provision time.
- name: Set up cross-host SSH for split-NFS deployments
  when: samba_nfs_server != "" or samba_nfs_homes_server != ""
  block:
    - name: Ensure /root/.ssh exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Generate DC root SSH keypair for cross-host home directory management
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N "" -f /root/.ssh/id_ed25519 -C "samba-dc home-dir mgmt"
        creates: /root/.ssh/id_ed25519

    # accept-new lets the DC trust the storage host's host key on first use
    # instead of failing the non-interactive ssh from samba-user.sh.
    - name: Configure ssh client to accept new storage host keys
      ansible.builtin.copy:
        dest: /root/.ssh/config
        mode: "0600"
        owner: root
        group: root
        content: |
          # Deployed by samba-dc role for samba-user.sh cross-host operations.
          Host *
              StrictHostKeyChecking accept-new
              UserKnownHostsFile /root/.ssh/known_hosts

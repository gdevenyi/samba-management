# exports.yml - Create share directories and NFSv4 export files.
#
# Per-share entries land in /etc/exports.d/<name>.exports so they can be
# added/removed independently.  Initial ownership uses the literal string
# "domain users" -- ownership is re-applied in services.yml after SSSD has
# come up and can actually resolve that to a numeric GID.
---
# Only the share base (/data) is created here.  Individual share directories
# and their per-share NFS export files are managed operationally from the DC
# with bin/samba-automount.sh add-share (which SSHes to this storage host).
- name: Create share base directory
  ansible.builtin.file:
    path: "{{ samba_share_base }}"
    state: directory
    mode: "0755"
    owner: root
    group: "domain users"

- name: Create /etc/exports.d directory
  ansible.builtin.file:
    path: /etc/exports.d
    state: directory
    mode: "0755"

- name: Ensure home base directory exists
  ansible.builtin.file:
    path: "{{ samba_home_base }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: samba_nfs_export_homes | bool

- name: Deploy NFS home directories export
  ansible.builtin.template:
    src: "{{ role_path }}/../common/templates/homes.exports.j2"
    dest: /etc/exports.d/homes.exports
    mode: "0644"
  when: samba_nfs_export_homes | bool
  notify: Reload NFS exports

# sssd-client defaults - Default variables for the sssd-client Ansible role.
#
# These configure SSSD authentication, home directory handling, and autofs
# on Linux clients.  Override in group_vars/linux_clients.yml.
---
# --- Domain identity ---
# Kerberos realm (uppercase).
sssd_realm: "EXAMPLE.INTERNAL"
# AD DNS domain (lowercase - used in DNS lookups and SSSD config).
sssd_domain: "example.internal"
# NetBIOS short name (uppercase).
sssd_domain_short: "EXAMPLE"

# --- Join credentials ---
sssd_admin_user: "Administrator"
# Empty by default; MUST be set in group_vars or vault.
sssd_admin_password: ""

# --- Home directory configuration ---
# Two modes are supported:
#   "local"   - pam_mkhomedir creates /home/ad/user on first login
#   "mounted" - autofs mounts the user's home dir via NFS from the DC
sssd_fallback_homedir: "/home/ad/%u"
sssd_mounted_homedir_base: "/home/ad"
sssd_default_shell: "/bin/bash"

# --- SSSD behaviour ---
# use_fully_qualified_names allows bare usernames for logins.
sssd_use_fully_qualified_names: false
# Cache credentials for offline authentication (e.g., laptop on WiFi).
sssd_cache_credentials: true
# Access provider "ad" respects AD userAccountControl flags (disabled,
# locked, etc.) and optionally GPO-based access control.
sssd_access_provider: "ad"

# --- DNS registration ---
# Two mutually-exclusive ways to put a host's A/PTR into the DC's AD zone:
#
#   sssd_register_dns   (default: ON) -- explicit registration run ON THE DC
#     via delegated `samba-tool dns add` (tasks/dns-register.yml).  No
#     client-side Kerberos, so it works on split-identity sites where the DC's
#     network name is outside the AD realm and GSS-TSIG updates fail.  This is
#     the robust default and what NFS storage hosts rely on.
#
#   sssd_dyndns_update  (default: OFF) -- SSSD dynamic DNS: the host
#     self-registers via GSS-TSIG.  Self-heals on IP change, but requires a
#     working host->DC GSS-TSIG path, so only enable it on NON-split-identity
#     networks (DC reachable by its AD name).  Opt in per group/host.
#
# To avoid double-registration, explicit registration defaults to "on unless
# DDNS is enabled"; set sssd_register_dns explicitly to override.
sssd_register_dns: "{{ not (sssd_dyndns_update | bool) }}"
sssd_dyndns_update: false
# Interface whose address DDNS publishes.  Defaults to the primary (default
# route) interface; override per-host when the AD-facing NIC isn't the default.
sssd_dyndns_iface: ""

# --- Login access control (ad_access_filter) ---
# Restricts which AD users may authenticate, via a per-host "anchor"
# group referenced with AD's LDAP chain-matching rule.  Any group
# nested inside the anchor automatically grants login -- no client
# changes when new class groups are added on the DC.
#
# Recommended (set in group_vars/linux_clients.yml):
#     sssd_login_anchor_group: "login-{{ ansible_facts['hostname'] }}"
#     sssd_login_anchor_catchall: "login-all"
#
# Then on the DC, to grant a class of users access to a class of
# machines:
#     samba-group add computenode-login
#     samba-tool group addmembers login-node01 computenode-login
#     samba-group add-members computenode-login alice,bob
# No Ansible run required.
#
# Empty (default) = no filter, any enabled AD user may log in.
# Only takes effect when sssd_access_provider == "ad".
sssd_login_anchor_group: ""
sssd_login_anchor_catchall: ""
# DN suffix for the anchor group.  Empty = auto-derive
# CN=Users,DC=<components-of-sssd_domain>.
sssd_login_anchor_base_dn: ""
sssd_login_anchor_bootstrap: true
# Raw filter override; non-empty value replaces the chain-matching
# filter.  Used for advanced cases.
sssd_ad_access_filter: ""

# --- Home directory mode ---
sssd_homedir_mode: "mounted"

# --- DC and autofs configuration ---
sssd_dc_hostname: "dc01"
# Whether to enable autofs on the client.  When true, the autofs package is
# installed, the mount-base directories are created, and SSSD is configured
# to broker maps from AD (no per-client map files).
sssd_configure_autofs: true
sssd_autofs_base: "/data"

# Extra krb5 [domain_realm] mappings for the client's /etc/krb5.conf.  Needed
# when AD servers (the DC or NFS servers) are reached by a DNS name that is NOT
# under the AD realm's domain -- e.g. an externally-owned site FQDN like
# host.uhnres.utoronto.ca serving a realm AD.GENETLAB.INTERNAL.  Without a
# mapping, krb5 derives the realm from the DNS domain, rpc.gssd asks for
# nfs/<host>@<wrong-realm>, and NFSv4 sec=krb5p mounts fail with "Server not
# found in Kerberos database" (user/getent lookups still work).  Keys are host
# FQDNs (or ".suffix" domains); values are the Kerberos realm.  Prefer specific
# host FQDNs over a broad ".suffix" so you don't hijack legitimate Kerberos
# services elsewhere in that domain.  Empty = no extra mappings (the common
# case, where servers use the AD DNS domain).
sssd_krb5_realm_map: {}
#   sssd_krb5_realm_map:
#     dc01.site.example.com: AD.EXAMPLE.COM
#     nfs01.site.example.com: AD.EXAMPLE.COM

# --- NFS mount options (shared with samba-dc role; same defaults) ---
# Kerberos security flavour: krb5 (auth), krb5i (auth+integrity), krb5p (full encryption)
samba_nfs_sec: "krb5p"

sssd_enable_ssh: true

sssd_enable_sudo: true

# Pull autofs maps from AD via SSSD's autofs service.  Requires the DC to
# have been provisioned with samba_enable_autofs_seed: true (default).
sssd_enable_autofs: true

# Deploy the client-side helper script from client/linux/:
#   healthcheck.sh -> /usr/local/sbin/domain-healthcheck.sh (executable)
sssd_deploy_client_scripts: true

# --- Post-join verification retries ---
# How long to wait for SSSD to start returning AD identities after a fresh
# realm join.  The user lookup is the more aggressive of the two because it
# usually has to talk to the DC; the group lookup typically follows quickly.
sssd_user_resolve_retries: 5
sssd_user_resolve_delay: 3
sssd_group_resolve_retries: 3
sssd_group_resolve_delay: 2

# linux_clients.yml - Group variables for Linux client hosts.
#
# SSSD join credentials are inherited from domain_members.yml.
# Only client-specific overrides go here.
---
# DNS registration: clients get their A/PTR into the DC's AD zone via the
# default explicit, DC-delegated mechanism (sssd_register_dns), which needs no
# client-side Kerberos and works on split-identity sites.  On a plain
# (non-split-identity) network where the DC is reachable by its AD name, you
# may instead prefer self-healing SSSD dynamic DNS -- uncomment:
#   sssd_dyndns_update: true   # explicit registration auto-disables when this is on

# Per-machine login restrictions using a chain-matched anchor group.
# Uncomment to enable; on first provision each client's anchor group
# (login-<hostname>) is auto-created on the DC, and if a catchall is
# set it is nested inside the anchor.  See CLAUDE.md > "Login Access
# Control" for the operator workflow (creating class groups, etc.).
# sssd_login_anchor_group: "login-{{ ansible_facts['hostname'] }}"
# sssd_login_anchor_catchall: "login-all"

# krb5 [domain_realm] mappings -- REQUIRED when the DC/NFS servers are reached
# by a site FQDN that isn't under the AD realm's DNS domain (otherwise NFSv4
# sec=krb5p home/share mounts fail with "Server not found in Kerberos
# database").  Map each server's site FQDN to the AD realm:
# sssd_krb5_realm_map:
#   dc01.site.example.com: AD.EXAMPLE.COM
